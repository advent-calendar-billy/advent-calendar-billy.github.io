<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Chat</title>
<link rel="stylesheet" href="../shared/base.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header id="topbar">
  <button class="iconBtn" id="backBtn" type="button" aria-label="volver">
    <svg viewBox="0 0 24 24"><path d="M15 4 L7 12 L15 20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <div class="avatarWrap">
    <img id="avatar" src="img/maxim.jpg" alt="" onerror="this.style.display='none'">
    <span class="onlineDot" id="onlineDot"></span>
  </div>
  <div class="who">
    <div class="name" id="profileName">Maxim</div>
    <div class="meta" id="profileMeta"></div>
  </div>
  <button class="iconBtn" type="button" aria-label="opciones">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.8" fill="currentColor"/><circle cx="12" cy="12" r="1.8" fill="currentColor"/><circle cx="12" cy="19" r="1.8" fill="currentColor"/></svg>
  </button>
</header>

<main id="thread"></main>

<footer id="composer">
  <button class="iconBtn dim" type="button" aria-label="foto">
    <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="14" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="13" r="4" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="9" y="3.5" width="6" height="3" rx="1" fill="currentColor"/></svg>
  </button>
  <div class="inputFake">Escribí un mensaje</div>
  <button class="iconBtn dim" type="button" aria-label="audio">
    <svg viewBox="0 0 24 24"><rect x="9.2" y="3.5" width="5.6" height="11" rx="2.8" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M6 11.5 a6 6 0 0 0 12 0 M12 17.5 V21" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
  </button>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.8.6/jsrsasign-all-min.js"></script>
<script src="../shared/config.js"></script>
<script src="../shared/sheets.js"></script>
<script src="../shared/fullscreen.js"></script>
<script src="script.js"></script>
</body>
</html>
