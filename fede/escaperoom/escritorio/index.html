<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Escritorio</title>
<link rel="stylesheet" href="../shared/base.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="desktop">
  <div id="icons"></div>
  <div id="windows"></div>
</div>

<div id="startMenu" hidden>
  <div class="smSide"><span>Windows</span>&nbsp;<b>2000</b></div>
  <div class="smItems" id="smItems"></div>
</div>

<div id="taskbar">
  <button id="startBtn" type="button">
    <svg viewBox="0 0 16 16" aria-hidden="true">
      <rect x="1" y="2" width="6" height="5" fill="#ff3d1f" transform="skewY(-6 )"/>
      <rect x="8" y="1" width="6" height="5" fill="#35b942" transform="skewY(-6)"/>
      <rect x="1" y="9" width="6" height="5" fill="#1f7bff" transform="skewY(-6)"/>
      <rect x="8" y="8" width="6" height="5" fill="#ffc51f" transform="skewY(-6)"/>
    </svg>
    Inicio
  </button>
  <div class="tbSep"></div>
  <div id="taskButtons"></div>
  <div id="tray">
    <span id="clock">--:--</span>
  </div>
</div>

<div id="dlgShade" hidden>
  <div id="dlg" role="alertdialog">
    <div class="dlgTitle"><span id="dlgTitleText">Restricciones</span><button class="tbtn dlgX" id="dlgClose" type="button" aria-label="Cerrar"><svg viewBox="0 0 10 10"><path d="M1 1 L9 9 M9 1 L1 9" stroke="currentColor" stroke-width="1.6"/></svg></button></div>
    <div class="dlgBody">
      <svg class="dlgIcon" viewBox="0 0 32 32" aria-hidden="true">
        <circle cx="16" cy="16" r="15" fill="#ff2a2a"/>
        <circle cx="16" cy="16" r="15" fill="none" stroke="#7d0000" stroke-width="1"/>
        <path d="M9 9 L23 23 M23 9 L9 23" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      </svg>
      <p id="dlgText"></p>
    </div>
    <div class="dlgBtns"><button class="btn" id="dlgOk" type="button">Aceptar</button></div>
  </div>
</div>

<script src="../shared/fullscreen.js"></script>
<script src="script.js"></script>
</body>
</html>
