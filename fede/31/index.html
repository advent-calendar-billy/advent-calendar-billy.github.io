<script src="data.js"></script>
<script>
// (PROPOSALS, QUESTIONS, Q3_VIBE_MAP, Q3B_VIBE_MAP, Q3C_VIBE_MAP, Q4_VIBE_MAP,
//  Q_PACE_MAP, Q_PHYS_MAP, PROPOSAL_TAGS, HIDDEN_GEMS, SWEET_TOURS,
//  RUINS_AND_CASTLES, GALLERIES loaded from data.js)

// ============================================================
// STATE
// ============================================================
let answers = {};
let currentQ = 0;

// ============================================================
// CAT (inline SVG, class-driven state machine)
// ============================================================
// All mood parts live in the SVG; we swap root class to show/hide them.
// CSS handles the micro-animations (blink, sparkle float, zzz, heart rise).
const CAT_LABELS = {
  idle: "", happy: "purr~", excited: "!", dreamy: "", sleepy: "zzz", shocked: "!?", thinking: ""
};
let catCurrentState = 'idle';
let catSleepyTimeout = null;

function setCat(state) {
  const svg = document.getElementById('cat-svg');
  const label = document.getElementById('cat-label');
  if (!svg) return;
  svg.setAttribute('class', 'cat-svg ' + state);
  label.textContent = CAT_LABELS[state] || '';
  catCurrentState = state;

  // Sleepy timeout: if Fede takes too long during the quiz, the cat dozes off.
  if (catSleepyTimeout) { clearTimeout(catSleepyTimeout); catSleepyTimeout = null; }
  if (state !== 'sleepy' && currentQ > 0 && currentQ < QUESTIONS.length) {
    catSleepyTimeout = setTimeout(() => {
      if (catCurrentState !== 'sleepy') setCat('sleepy');
    }, 18000);
  }
}

// ============================================================
// NAVIGATION
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.remove('active');
  void el.offsetWidth; // force reflow for re-animation
  el.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Condition check that understands both single and array-valued answers.
// If committed answer is an array, the condition is satisfied when the
// array includes the required value (multi-Q3 → fire Q3b for each vibe).
function _conditionMet(q) {
  if (!q.condition) return true;
  const committed = answers[q.condition.questionId];
  if (committed === undefined) return false;
  if (Array.isArray(committed)) return committed.includes(q.condition.value);
  return committed === q.condition.value;
}

// Total visible questions is dynamic now — Q3 multi-select fires Q3b per
// selected vibe, so the denominator isn't fixed at 10.
function getTotalVisibleQuestions() {
  let count = 0;
  for (const q of QUESTIONS) {
    if (_conditionMet(q)) count++;
  }
  return count;
}

function getVisibleQuestionNumber() {
  let count = 0;
  for (let i = 0; i < currentQ; i++) {
    if (_conditionMet(QUESTIONS[i])) count++;
  }
  return count + 1;
}

function updateProgress(visibleNum) {
  const total = Math.max(getTotalVisibleQuestions(), 1);
  const pct = ((visibleNum - 1) / total) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
}

// ============================================================
// QUIZ FLOW
// ============================================================
function startQuiz() {
  currentQ = 0;
  answers = {};
  setCat('idle');
  showQuestion();
}

function showQuestion() {
  // Skip conditional questions whose condition is not met (handles multi-
  // select: answer may be an array — check `.includes(condition.value)`).
  while (currentQ < QUESTIONS.length) {
    if (_conditionMet(QUESTIONS[currentQ])) break;
    currentQ++;
  }

  // Auto-skip: if the user's answers so far narrow to a single destination
  // (either no other destination passes hard filters, or only one matches
  // every committed preference), further questions can't change the outcome
  // — jump straight to reveal.
  if (countHardEligible() === 1) { doReveal(); return; }
  const strongOne = countStrongEligible();
  if (strongOne === 1 && hasAnyCommitment()) { doReveal(); return; }

  // Auto-skip uninformative questions — where no option narrows the pool
  // further than the "egal / no preference" baseline. Asking these just
  // feels wasted; picking any option wouldn't visibly change the count.
  // Never skips hard commitments (Q1 days, Q2 distance) — those are trip
  // decisions, not filters.
  while (currentQ < QUESTIONS.length) {
    const q = QUESTIONS[currentQ];
    if (q.id === 1 || q.id === 2) break;
    if (!isUninformative(q)) break;
    currentQ++;
    while (currentQ < QUESTIONS.length && !_conditionMet(QUESTIONS[currentQ])) currentQ++;
  }
  if (currentQ >= QUESTIONS.length) { doReveal(); return; }

  if (currentQ >= QUESTIONS.length) {
    doReveal();
    return;
  }
  const q = QUESTIONS[currentQ];
  const visibleNum = getVisibleQuestionNumber();
  updateProgress(visibleNum);
  document.getElementById('q-number').textContent = 'Question ' + visibleNum + ' of ' + getTotalVisibleQuestions();
  const kindEl = document.getElementById('q-kind');
  const isCommitment = (q.id === 1 || q.id === 2);
  kindEl.textContent = isCommitment ? 'I choose\u2026' : 'I prefer\u2026';
  kindEl.className = 'q-kind ' + (isCommitment ? 'commitment' : 'preference');
  document.getElementById('q-text').textContent = q.text;

  const isMulti = MULTI_SELECT_IDS.has(q.id);
  const container = document.getElementById('q-answers');

  // Re-render whenever a multi-select toggle happens; single-select auto-advances.
  function renderOptions() {
    container.innerHTML = '';
    q.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'answer-btn';

      const feas = feasibilityForOption(q, opt.value, answers);

      // Is this option currently selected?
      let selected = false;
      if (isMulti) {
        if (opt.value === "_skip") {
          selected = answers[q.id] === "_skip" || (Array.isArray(answers[q.id]) && answers[q.id].includes("_skip"));
        } else {
          const cur = _vals(answers[q.id]);
          selected = cur.includes(opt.value);
        }
      }
      if (selected) btn.classList.add('selected');

      // Label + chip
      const labelSpan = document.createElement('span');
      labelSpan.className = 'answer-label';
      labelSpan.textContent = opt.label;
      btn.appendChild(labelSpan);

      const chip = document.createElement('span');
      chip.className = 'answer-chip';
      if (opt.value === "_skip") {
        // Egal = no further filtering on this question. Label as "N remain"
        // (not "N matches") so the count reads as the unchanged baseline,
        // not a widened pool. The specific options narrow further; this one
        // keeps the pool as-is.
        chip.textContent = feas.strongCount + ' remain';
        chip.classList.add('skip');
      } else if (feas.hardCount === 0) {
        chip.textContent = '0 matches';
        chip.classList.add('zero');
        btn.classList.add('dead-end');
        btn.disabled = true;
        btn.title = feas.reason || 'No destinations match your current answers.';
      } else if (feas.strongCount === 0) {
        chip.textContent = 'trade-off';
        chip.classList.add('weak');
        btn.title = 'This answer is honored \u2014 but no destination satisfies every one of your preferences. Expect to give on one or two (e.g. morning style, pace, or budget).';
      } else {
        chip.textContent = feas.strongCount + (feas.strongCount === 1 ? ' match' : ' matches');
        chip.classList.add('ok');
      }
      btn.appendChild(chip);

      btn.addEventListener('click', () => {
        if (btn.disabled) return;
        if (isMulti) {
          toggleMulti(q, opt.value);
          setCat(opt.cat);
          renderOptions();
        } else {
          answers[q.id] = opt.value;
          setCat(opt.cat);
          currentQ++;
          setTimeout(() => showQuestion(), 350);
        }
      });
      container.appendChild(btn);
    });

    // Multi-select: append a Continue button below the options
    if (isMulti) {
      const cur = _vals(answers[q.id]);
      const egalActive = answers[q.id] === "_skip" || (Array.isArray(answers[q.id]) && answers[q.id].includes("_skip"));
      const canContinue = cur.length > 0 || egalActive;

      const hint = document.createElement('div');
      hint.className = 'multi-hint';
      if (!canContinue) {
        hint.textContent = 'Pick one or more \u2014 or \u201cEs ist mir egal\u201d to pass.';
      } else if (egalActive) {
        hint.textContent = 'You\u2019re flexible on this one.';
      } else {
        hint.textContent = cur.length === 1 ? '1 option selected' : `${cur.length} options selected`;
      }
      container.appendChild(hint);

      const contBtn = document.createElement('button');
      contBtn.className = 'btn-continue';
      contBtn.textContent = 'Continue \u2192';
      if (!canContinue) { contBtn.disabled = true; }
      contBtn.addEventListener('click', () => {
        if (contBtn.disabled) return;
        currentQ++;
        setTimeout(() => showQuestion(), 250);
      });
      container.appendChild(contBtn);
    }
  }

  renderOptions();
  showScreen('q-screen');
}

// Toggle a multi-select option in/out of answers[q.id].
// "Es ist mir egal" (_skip) on unconditional questions is a mutually-exclusive
// mode flag. On conditional screens (per-vibe Q3b/Q3c when Q3 is multi-select),
// clicking egal only clears THIS screen's values so the other vibe's picks
// aren't wiped.
function toggleMulti(q, optValue) {
  const cur = Array.isArray(answers[q.id]) ? answers[q.id].slice() : [];
  const thisScreenValues = q.options.map(o => o.value).filter(v => v !== "_skip");

  if (optValue === "_skip") {
    if (q.condition) {
      // Per-vibe Q3b/Q3c: drop only this screen's own values.
      const next = cur.filter(v => v !== "_skip" && !thisScreenValues.includes(v));
      answers[q.id] = next.length === 0 ? undefined : next;
    } else {
      const egalActive = cur.includes("_skip") || answers[q.id] === "_skip";
      answers[q.id] = egalActive ? undefined : ["_skip"];
    }
    return;
  }

  const real = cur.filter(v => v !== "_skip");
  if (real.includes(optValue)) {
    const next = real.filter(v => v !== optValue);
    answers[q.id] = next.length === 0 ? undefined : next;
  } else {
    answers[q.id] = [...real, optValue];
  }
}

// ============================================================
// FEASIBILITY — two levels:
//   hardCount  = destinations surviving hard filters (days, dist) + Q3 vibe.
//                If 0 → dead-end, button disabled.
//   strongCount = destinations that ALSO satisfy every committed soft signal
//                 (Q3b, Q3c, Q4 morning, pace, phys, budget). This is what
//                 we display so each answer visibly narrows the count.
// ============================================================
function feasibilityForOption(q, optValue, committed) {
  // Multi-select probe: always INCLUDE this option in the tentative selection.
  // Semantic: "if this option ends up in your final selection, how many
  // destinations match?". Stable across already-selected and not-selected
  // options — a selected option's chip doesn't change when re-rendered.
  let probeVal;
  if (MULTI_SELECT_IDS.has(q.id) && optValue !== "_skip") {
    const current = _vals(committed[q.id]);
    probeVal = current.includes(optValue) ? current : [...current, optValue];
    if (probeVal.length === 0) probeVal = undefined;
  } else {
    probeVal = optValue;
  }
  const probe = { ...committed, [q.id]: probeVal };

  const daysVals = _vals(probe[1]);
  const distVals = _vals(probe[2]);
  const vibeVals = _vals(probe[3]);
  const subVals = _vals(probe["3b"]);
  const microVals = _vals(probe["3c"]);
  const mornVals = _vals(probe[4]);
  const paceVals = _vals(probe.pace);
  const physVals = _vals(probe.phys);
  const budgetVals = _vals(probe[5]);

  const vT = unionTargets(Q3_VIBE_MAP, vibeVals);
  const subT = unionTargets(Q3B_VIBE_MAP, subVals);
  const microT = unionTargets(Q3C_VIBE_MAP, microVals);
  const mornT = unionTargets(Q4_VIBE_MAP, mornVals);
  const paceT = unionTargets(Q_PACE_MAP, paceVals);
  const physT = unionTargets(Q_PHYS_MAP, physVals);

  let hard = 0, strong = 0;
  for (const p of PROPOSALS) {
    // Hard filters (multi-select union: any selected value matches)
    if (daysVals.length && !daysVals.some(d => p.days.includes(d))) continue;
    if (distVals.length && !distVals.includes(p.dist)) continue;
    if (vibeVals.length && !p.vibes.some(v => vT.includes(v))) continue;
    hard++;

    // Soft signals: every committed non-skip signal must land
    const pTags = PROPOSAL_TAGS[p.id] || [];
    if (subT.length && !(p.subVibes && p.subVibes.some(v => subT.includes(v)))) continue;
    if (microT.length && !pTags.some(t => microT.includes(t))) continue;
    if (mornT.length && !p.vibes.some(v => mornT.includes(v))) continue;
    if (paceT.length && !pTags.some(t => paceT.includes(t))) continue;
    if (physT.length && !pTags.some(t => physT.includes(t))) continue;
    if (budgetVals.length && !budgetVals.includes(p.budget)) continue;
    strong++;
  }

  let reason = '';
  if (hard === 0) {
    const parts = [];
    if (daysVals.length) parts.push(daysVals.join('/') + ' days');
    if (distVals.length) parts.push(distVals.map(d => d === 'germany' ? 'Germany' : d).join(' or '));
    if (vibeVals.length) parts.push(vibeVals.join('/'));
    reason = parts.length
      ? 'No destinations match: ' + parts.join(' + ') + '. Try a different answer.'
      : 'No destinations match your answers.';
  }

  return { hardCount: hard, strongCount: strong, reason };
}

// ============================================================
// SCORING ENGINE
// ============================================================
// V2-C: treat "_skip" as "no signal — no filter, no scoring". Any answer
// equal to "_skip" (the "I'm flexible" opt-out) is treated as absent.
function _v(x) {
  if (x === undefined || x === null || x === "_skip") return undefined;
  if (Array.isArray(x)) {
    const eff = x.filter(v => v !== "_skip");
    return eff.length === 0 ? undefined : (eff.length === 1 ? eff[0] : eff);
  }
  return x;
}
// V2-D multi-select: return the effective list of values (drops _skip, wraps
// single into an array). Used by scoring + feasibility when a signal may be
// a singleton or a multi-selection.
function _vals(x) {
  if (x === undefined || x === null) return [];
  const arr = Array.isArray(x) ? x : [x];
  return arr.filter(v => v !== "_skip");
}
// Union the target tags across all selected values of a multi-select answer.
// Never duplicates. Returns [] if nothing selected.
function unionTargets(map, vals) {
  const out = new Set();
  for (const v of vals) {
    const t = map[v] || [];
    for (const x of t) out.add(x);
  }
  return [...out];
}
// Count destinations still eligible under current hard filters + primary
// vibe. When this drops to 1, further soft preferences can't narrow
// anything — we auto-skip to reveal. Mirrors feasibilityForOption's "hard" pass.
function countHardEligible() {
  const daysVals = _vals(answers[1]);
  const distVals = _vals(answers[2]);
  const vibeVals = _vals(answers[3]);
  const vT = unionTargets(Q3_VIBE_MAP, vibeVals);
  let n = 0;
  for (const p of PROPOSALS) {
    if (daysVals.length && !daysVals.some(d => p.days.includes(d))) continue;
    if (distVals.length && !distVals.includes(p.dist)) continue;
    if (vibeVals.length && !p.vibes.some(v => vT.includes(v))) continue;
    n++;
  }
  return n;
}

// Count destinations satisfying every committed (non-skip) signal.
// Mirrors feasibilityForOption's "strong" pass.
function countStrongEligible() {
  const daysVals = _vals(answers[1]);
  const distVals = _vals(answers[2]);
  const vibeVals = _vals(answers[3]);
  const subVals = _vals(answers["3b"]);
  const microVals = _vals(answers["3c"]);
  const mornVals = _vals(answers[4]);
  const paceVals = _vals(answers.pace);
  const physVals = _vals(answers.phys);
  const budgetVals = _vals(answers[5]);

  const vT = unionTargets(Q3_VIBE_MAP, vibeVals);
  const subT = unionTargets(Q3B_VIBE_MAP, subVals);
  const microT = unionTargets(Q3C_VIBE_MAP, microVals);
  const mornT = unionTargets(Q4_VIBE_MAP, mornVals);
  const paceT = unionTargets(Q_PACE_MAP, paceVals);
  const physT = unionTargets(Q_PHYS_MAP, physVals);

  let n = 0;
  for (const p of PROPOSALS) {
    if (daysVals.length && !daysVals.some(d => p.days.includes(d))) continue;
    if (distVals.length && !distVals.includes(p.dist)) continue;
    if (vibeVals.length && !p.vibes.some(v => vT.includes(v))) continue;
    const pTags = PROPOSAL_TAGS[p.id] || [];
    if (subT.length && !(p.subVibes && p.subVibes.some(v => subT.includes(v)))) continue;
    if (microT.length && !pTags.some(t => microT.includes(t))) continue;
    if (mornT.length && !p.vibes.some(v => mornT.includes(v))) continue;
    if (paceT.length && !pTags.some(t => paceT.includes(t))) continue;
    if (physT.length && !pTags.some(t => physT.includes(t))) continue;
    if (budgetVals.length && !budgetVals.includes(p.budget)) continue;
    n++;
  }
  return n;
}

// Has the user committed at least one non-skip value anywhere? Used as a
// guard before auto-skipping on strongCount === 1 — avoid firing on the
// degenerate case where no real signal is committed.
function hasAnyCommitment() {
  for (const k of [1, 2, 3, "3b", "3c", 4, "pace", "phys", 5]) {
    if (_vals(answers[k]).length > 0) return true;
  }
  return false;
}

// True if no real option on this question narrows the pool below baseline
// (the count user would see on "Es ist mir egal"). In that case the
// question visibly does nothing — skip it rather than ask Fede to
// micro-choose between three options that all show the same count.
function isUninformative(q) {
  if (!q || !q.options) return false;
  const baseline = feasibilityForOption(q, "_skip", answers).strongCount;
  for (const opt of q.options) {
    if (opt.value === "_skip") continue;
    const feas = feasibilityForOption(q, opt.value, answers);
    if (feas.strongCount < baseline) return false;  // this option narrows
  }
  return true;
}

// Every question is multi-select. Egal already proves the system handles
// "no constraint" per question; multi-select is just the middle ground
// between "one specific value" and "none". For Q1 (days) and Q2 (distance)
// a multi-select means "I'm open to any of these"; for Q3 (vibe) it fires
// the conditional Q3b/Q3c for EACH selected vibe in turn — the condition
// checker below uses `includes` on array answers so this just works.
const MULTI_SELECT_IDS = new Set([1, 2, 3, "3b", "3c", 4, "pace", "phys", 5, 6]);

function scoreDestinations() {
  const daysVals = _vals(answers[1]);        // multi — union in hard filter
  const distVals = _vals(answers[2]);        // multi — union in hard filter
  const vibeVals = _vals(answers[3]);        // multi — union targets
  const subVibeVals = _vals(answers["3b"]);
  const microVibeVals = _vals(answers["3c"]);
  const morningVals = _vals(answers[4]);
  const paceVals = _vals(answers.pace);
  const physVals = _vals(answers.phys);
  const budgetVals = _vals(answers[5]);

  const primaryVibes = unionTargets(Q3_VIBE_MAP, vibeVals);
  const subTargets = unionTargets(Q3B_VIBE_MAP, subVibeVals);
  const microTargets = unionTargets(Q3C_VIBE_MAP, microVibeVals);
  const secondaryVibes = unionTargets(Q4_VIBE_MAP, morningVals);
  const paceTargets = unionTargets(Q_PACE_MAP, paceVals);
  const physTargets = unionTargets(Q_PHYS_MAP, physVals);

  let scored = PROPOSALS.map(p => {
    let score = 0;
    let eligible = true;

    // Hard filters (multi-select: any selected value matches)
    if (daysVals.length && !daysVals.some(d => p.days.includes(d))) eligible = false;
    if (distVals.length && !distVals.includes(p.dist)) eligible = false;
    if (!eligible) return { proposal: p, score: -1 };

    const pTags = PROPOSAL_TAGS[p.id] || [];

    // Q3 primary vibe +3 (on p.vibes, multi: union)
    if (primaryVibes.length && p.vibes.some(v => primaryVibes.includes(v))) score += 3;

    // Q3b sub-vibe refinement +3 (multi)
    if (subTargets.length && p.subVibes && p.subVibes.some(v => subTargets.includes(v))) score += 3;

    // Q3c micro-vibe +3 (multi, on PROPOSAL_TAGS)
    if (microTargets.length && pTags.some(t => microTargets.includes(t))) score += 3;

    // Q4 morning-derived vibes +2 (multi, on p.vibes)
    if (secondaryVibes.length && p.vibes.some(v => secondaryVibes.includes(v))) score += 2;

    // Pace +2 (multi, on PROPOSAL_TAGS)
    if (paceTargets.length && pTags.some(t => paceTargets.includes(t))) score += 2;

    // Physicality +2 (multi, on PROPOSAL_TAGS)
    if (physTargets.length && pTags.some(t => physTargets.includes(t))) score += 2;

    // Budget alignment +2 (multi — any selected budget matches)
    if (budgetVals.length && budgetVals.includes(p.budget)) score += 2;

    // Q6 ("hidden gems" vs "classics") no longer affects destination scoring.
    // In V2-B, every destination has hidden-gem highlights within it; the
    // answer drives highlight sort order + chip, not destination selection.
    // See renderProposalCard.

    return { proposal: p, score };
  });

  // Filter out ineligible
  scored = scored.filter(s => s.score >= 0);

  // Sort descending
  scored.sort((a, b) => b.score - a.score);

  // Tiebreaker: shuffle among tied top scores
  if (scored.length > 1) {
    const topScore = scored[0].score;
    const tied = scored.filter(s => s.score === topScore);
    if (tied.length > 1) {
      // Fisher-Yates on tied items
      for (let i = tied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [tied[i], tied[j]] = [tied[j], tied[i]];
      }
      scored = [...tied, ...scored.filter(s => s.score < topScore)];
    }
  }

  return scored;
}

// ============================================================
// REVEAL
// ============================================================
function doReveal() {
  document.getElementById('progressBar').style.width = '100%';
  const results = scoreDestinations();
  window._results = results;

  if (results.length === 0) {
    // Fallback: show all with best guess
    window._results = PROPOSALS.map(p => ({ proposal: p, score: 0 }));
  }

  const top = results[0].proposal;
  document.getElementById('stamp-name').textContent = top.name;
  document.getElementById('stamp-country').textContent = top.country;
  setCat('excited');
  showScreen('reveal');
}

// Resolve an inline image src path. Each destination has a folder
// images/{id}-{slug}/; the img field stores just a file name or a full
// relative path. Accept both shapes.
function inlineImgSrc(p, img) {
  if (!img || !img.file) return '';
  if (img.file.startsWith('images/')) return img.file;
  const gallery = GALLERIES[p.id];
  const slug = gallery && gallery.slug ? gallery.slug : '';
  return `images/${p.id}-${slug}/${img.file}`;
}

// Inline thumbnail — small clickable image that opens the lightbox.
function inlineThumb(p, img) {
  if (!img || !img.file) return '';
  const src = inlineImgSrc(p, img);
  const cap = (img.caption || '').replace(/"/g, '&quot;');
  const cred = (img.credit || '').replace(/"/g, '&quot;');
  return `<button class="inline-thumb" data-src="${src}" data-caption="${cap}" data-credit="${cred}" aria-label="${cap || 'photo'}"><img src="${src}" alt="${cap}" loading="lazy"></button>`;
}

// Lightbox: opened when user clicks any `.inline-thumb` in the proposal card.
function openLightbox(src, caption, credit) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');
  const cap = document.getElementById('lightbox-caption');
  const cred = document.getElementById('lightbox-credit');
  if (!lb || !img) return;
  img.src = src;
  img.alt = caption || '';
  cap.textContent = caption || '';
  cred.textContent = credit || '';
  lb.classList.add('open');
  lb.setAttribute('aria-hidden', 'false');
}
function closeLightbox() {
  const lb = document.getElementById('lightbox');
  if (!lb) return;
  lb.classList.remove('open');
  lb.setAttribute('aria-hidden', 'true');
  const img = document.getElementById('lightbox-img');
  if (img) img.src = '';
}
// Event delegation for any `.inline-thumb` click inside the document.
document.addEventListener('click', (e) => {
  const thumb = e.target.closest && e.target.closest('.inline-thumb');
  if (thumb) {
    e.preventDefault();
    openLightbox(thumb.getAttribute('data-src'), thumb.getAttribute('data-caption'), thumb.getAttribute('data-credit'));
    return;
  }
  const lb = document.getElementById('lightbox');
  if (lb && lb.classList.contains('open') && (e.target === lb || e.target.id === 'lightbox-img')) {
    closeLightbox();
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeLightbox();
});

// Gallery: click a thumbnail → swap it into the hero position.
// Keeps the thumb strip clickable; the current hero thumb gets a "selected"
// ring so the gallery stays coherent.
function wireGallerySwap() {
  const heroImg = document.getElementById('gallery-hero-img');
  const heroCredit = document.getElementById('gallery-hero-credit');
  if (!heroImg) return;

  const thumbs = document.querySelectorAll('.gallery-thumb');
  thumbs.forEach(thumb => {
    thumb.addEventListener('click', () => {
      const newSrc = thumb.getAttribute('data-src');
      const newCaption = thumb.getAttribute('data-caption') || '';
      const newCredit = thumb.getAttribute('data-credit') || '';

      // Swap hero <-> thumb (preserves the full gallery — user can click back).
      const currentSrc = heroImg.getAttribute('src');
      const currentCaption = heroImg.getAttribute('data-caption') || heroImg.getAttribute('alt') || '';
      const currentCredit = heroCredit ? heroCredit.textContent : '';

      const thumbImg = thumb.querySelector('img');
      thumb.setAttribute('data-src', currentSrc);
      thumb.setAttribute('data-caption', currentCaption);
      thumb.setAttribute('data-credit', currentCredit);
      if (thumbImg) { thumbImg.setAttribute('src', currentSrc); thumbImg.setAttribute('alt', currentCaption); }

      heroImg.setAttribute('src', newSrc);
      heroImg.setAttribute('alt', newCaption);
      heroImg.setAttribute('data-caption', newCaption);
      if (heroCredit) heroCredit.textContent = newCredit;
    });
  });
}

function showProposal() {
  const results = window._results;
  const top = results[0].proposal;

  document.getElementById('proposal-section').innerHTML = renderProposalCard(top, true);
  wireGallerySwap();

  // Runners-up
  const runnersContainer = document.getElementById('runners-list');
  runnersContainer.innerHTML = '';
  const runners = results.slice(1, 3);
  if (runners.length === 0) {
    document.getElementById('runners-up').style.display = 'none';
  } else {
    document.getElementById('runners-up').style.display = 'block';
    document.getElementById('runners-toggle').textContent = 'See Other Options (' + runners.length + ')';
    runners.forEach(r => {
      runnersContainer.innerHTML += renderRunnerCard(r.proposal);
    });
  }

  // Combo trips: show combos that include the top result
  const comboSection = document.getElementById('combo-section');
  const comboList = document.getElementById('combo-list');
  const relevantCombos = COMBO_TRIPS.filter(c => c.ids.includes(top.id));
  if (relevantCombos.length > 0) {
    comboSection.style.display = 'block';
    comboList.innerHTML = relevantCombos.map(c => {
      const otherIds = c.ids.filter(id => id !== top.id);
      const otherNames = otherIds.map(id => PROPOSALS.find(p => p.id === id)?.name || '').join(' + ');
      return `<div class="combo-card"><h5>${c.theme}</h5><p>Combine with <strong>${otherNames}</strong> — ${c.description}</p></div>`;
    }).join('');
  } else {
    comboSection.style.display = 'none';
  }

  setCat('dreamy');
  showScreen('proposal-screen');
}

// ============================================================
// USER TAG BUNDLE & HIGHLIGHT AUTO-TAGGING
// ============================================================
// The "spotlight" feature: highlights whose semantic tags overlap the user's
// answer-derived tag bundle get bolder treatment. Kept narrow (Q3b+Q3c+Q6)
// on purpose so ~1-2 highlights per proposal get spotlit, not all four.
function computeUserTagBundle() {
  const bundle = new Set();
  // Q3b sub-vibe (broad but still purposeful)
  (Q3B_VIBE_MAP[answers["3b"]] || []).forEach(t => bundle.add(t));
  // Q3c micro-vibe (specific — the main driver)
  (Q3C_VIBE_MAP[answers["3c"]] || []).forEach(t => bundle.add(t));
  // Q6 hidden-gems intent
  if (answers[6] === 'easter') bundle.add('hidden');
  return bundle;
}

function computeHighlightTags(text) {
  const t = text.toLowerCase();
  const tags = new Set();
  if (/(ruin|fortress|burg\b|schloss|festung|veste|stiftskirche|gravensteen|kehlstein)/.test(t)) { tags.add('hilltop-ruins'); tags.add('fortress'); tags.add('ruins'); }
  if (/(hilltop|on the hill|overlooking|schlossberg|toompea|montjuic|on a hill)/.test(t)) tags.add('hilltop-castle');
  if (/(trail|hike|trek|ridge|summit|peak|km\)|malerweg|tour du|bastei|brocken|schauinsland|8 km|5 km|4 km|3 km)/.test(t)) tags.add('trekking');
  if (/(steep|climb|ladder|stairway|hiking-heavy)/.test(t)) tags.add('hiking-heavy');
  if (/(marzipan)/.test(t)) { tags.add('marzipan'); tags.add('sweets'); tags.add('pastries'); }
  if (/(chocolat|ganache|goldhelm|niederegger|kalev)/.test(t)) { tags.add('chocolate'); tags.add('sweets'); }
  if (/(pastry|patis|cornetto|nata|rogal|bougatsa|praline|kanel|baumkuchen|schwarzw|torte|cake|gingerbread|lebkuchen|wafer)/.test(t)) { tags.add('pastries'); tags.add('sweets'); }
  if (/(coffee|espresso|roaster|barista|cafe|caf\u00e9|kaffeehaus)/.test(t)) { tags.add('coffee'); tags.add('roastery'); }
  if (/(ramen|sushi|japanese|washoku|tonkotsu)/.test(t)) tags.add('ramen');
  if (/(museum|gallery|library|panorama|altarpiece|chagall|bauhaus|van eyck|goethe|schiller|wartburg)/.test(t)) tags.add('museums');
  if (/(goethe|schiller|h\u00f6lderlin|literary|bookshop|library)/.test(t)) tags.add('literary');
  if (/(art|painting|baroque|resid|fresco|\u00b0 painting)/.test(t)) tags.add('art');
  if (/(unesco|memorial|historic|medieval)/.test(t)) tags.add('culture');
  if (/(buchenwald|memorial|wwii|world war|jewish|holocaust|nazi)/.test(t)) { tags.add('memorial'); tags.add('wwii'); tags.add('history_deep'); }
  if (/(byzantin|roman|ancient|plague column)/.test(t)) tags.add('ancient');
  if (/(cliff|chalk|steilufer|bastei.*194)/.test(t)) { tags.add('cliffs'); tags.add('cliff-walk'); }
  if (/(lake|see\b|k\u00f6nigssee|reichenau|mainau)/.test(t)) { tags.add('lakeside'); tags.add('gardens'); }
  if (/(beach|bay|coast|hanseatic|baltic|sea\b|harbor|hafen|fjord|pier|sopot|binz)/.test(t)) { tags.add('coastal'); tags.add('maritime'); }
  if (/(cathedral|church|kirche|dom\b|basilica|synagog|monaster|cloister|konigskapelle|reichenau)/.test(t)) { tags.add('cathedrals'); tags.add('sacred'); }
  if (/(bridge|br\u00fccke|gate|tower|turm|wall|stone bridge|philosophenweg|steinerne)/.test(t)) tags.add('architecture');
  if (/(bath|thermal|spa|sauna|hot spring|colonnade|becherovka|mineral)/.test(t)) { tags.add('spa'); tags.add('thermal'); tags.add('indulgence'); }
  if (/(wine|bouchon|vineyard|tasting|cellar|port wine|wein)/.test(t)) tags.add('wine');
  if (/(beer|brau|schlenker|rauchbier|pilsner|bock)/.test(t)) tags.add('beer');
  if (/(market|markt|halle|mercato)/.test(t)) tags.add('markets');
  if (/(gondola|cable car|schauinsland|seilbahn|jenner|eagle|kehlstein)/.test(t)) { tags.add('viewpoint'); tags.add('cable-car'); }
  if (/(garden|flower|mainau|planten)/.test(t)) tags.add('gardens');
  if (/(steam train|rasender|brockenbahn)/.test(t)) tags.add('steam-train');
  if (/(cozy|cobblestone|half-timber|fachwerk)/.test(t)) tags.add('cozy');
  if (/(boat|punt|ferry|stocherkahn)/.test(t)) tags.add('boat');
  if (/(fountain)/.test(t)) tags.add('fountains');
  if (/(street art|mural|studio)/.test(t)) tags.add('street-art');
  return tags;
}

function isSpotlit(highlightText, userBundle) {
  if (userBundle.size === 0) return false;
  const tags = computeHighlightTags(highlightText);
  for (const t of tags) if (userBundle.has(t)) return true;
  return false;
}

// ============================================================
// RENDER CARDS
// ============================================================
function renderProposalCard(p, isMain) {
  const userBundle = computeUserTagBundle();

  let budgetRows = p.budgetTable.map((row, i) => {
    const isLast = i === p.budgetTable.length - 1;
    return `<tr${isLast ? ' style="font-weight:700"' : ''}><td>${row[0]}</td><td>${row[1]}</td></tr>`;
  }).join('');

  // Highlights: each entry may have { hidden: true } flag. When user picked
  // "hidden gems" in Q6, hidden ones sort to the top and get a distinct chip.
  // Otherwise, classic highlights sort first and hidden entries render softer.
  const preferHidden = answers[6] === 'easter';
  const sortedHighlights = [...p.highlights].sort((a, b) => {
    const ah = a.hidden ? 1 : 0;
    const bh = b.hidden ? 1 : 0;
    return preferHidden ? (bh - ah) : (ah - bh);
  });

  let highlightItems = sortedHighlights.map(h => {
    const spot = isSpotlit(h.text, userBundle);
    const title = h.text.split(' \u2014 ')[0];
    const rest = h.text.includes(' \u2014 ') ? ' \u2014 ' + h.text.split(' \u2014 ').slice(1).join(' \u2014 ') : '';

    const isHidden = !!h.hidden;
    const hiddenActive = isHidden && preferHidden;      // the featured case
    const hiddenDormant = isHidden && !preferHidden;    // kept in list, softer

    let chip = '';
    let cls = '';
    if (hiddenActive) { chip = '<span class="hidden-chip">\ud83d\udddd hidden gem</span>'; cls = 'spotlit hidden-active'; }
    else if (spot) { chip = '<span class="spotlight-chip">for you</span>'; cls = 'spotlit'; }
    else if (hiddenDormant) { cls = 'hidden-dormant'; }

    const thumb = inlineThumb(p, h.img);
    return `<li${cls ? ` class="${cls}"` : ''}>${h.icon} ${chip}<strong>${title}</strong>${rest}${thumb}</li>`;
  }).join('');

  // Gallery: hero + 2-3 supporting. GALLERIES entry has { slug, photos: [...] }.
  const gallery = GALLERIES[p.id];
  let galleryHtml = '';
  if (gallery && gallery.photos && gallery.photos.length > 0) {
    const basePath = `images/${p.id}-${gallery.slug}`;
    const hero = gallery.photos[0];
    const supporting = gallery.photos.slice(1);
    let thumbsHtml = '';
    if (supporting.length > 0) {
      thumbsHtml = `<div class="gallery-thumbs">${supporting.map((g, i) =>
        `<button class="gallery-thumb" data-src="${basePath}/${g.file}" data-caption="${(g.caption||'').replace(/"/g,'&quot;')}" data-credit="${(g.credit||'').replace(/"/g,'&quot;')}" aria-label="${g.caption||'photo'}"><img src="${basePath}/${g.file}" alt="${g.caption||''}" loading="lazy"></button>`
      ).join('')}</div>`;
    }
    galleryHtml = `
      <figure class="gallery-hero">
        <img id="gallery-hero-img" src="${basePath}/${hero.file}" alt="${hero.caption||p.name}" data-caption="${(hero.caption||'').replace(/"/g,'&quot;')}" loading="eager">
        <figcaption>
          <span class="gallery-country">${p.country}</span>
          <span class="gallery-credit" id="gallery-hero-credit">${hero.credit || ''}</span>
        </figcaption>
      </figure>
      ${thumbsHtml}
    `;
  }

  // Enrichment: sweet tour (surfaced if user leans sweet)
  const sweet = SWEET_TOURS[p.id];
  let sweetHtml = '';
  if (sweet && (userBundle.has('sweets') || userBundle.has('chocolate') || userBundle.has('pastries') || userBundle.has('cakes'))) {
    sweetHtml = `
      <div class="section-title">\ud83c\udf6c Sweet Tour Pick</div>
      <div class="sweet-tour-card">
        <strong>${sweet.name}</strong>
        <p>${sweet.description}</p>
        <div class="sweet-tour-meta"><span>\u23f1\ufe0f ${sweet.duration}</span><span>${sweet.bookingNote}</span></div>
        ${inlineThumb(p, sweet.img)}
      </div>`;
  }

  // Enrichment: ruins / hilltop castle (surfaced if user leans ruins/hilltop)
  const ruin = RUINS_AND_CASTLES[p.id];
  let ruinHtml = '';
  if (ruin && (userBundle.has('hilltop-ruins') || userBundle.has('hilltop-castle') || userBundle.has('fortress') || userBundle.has('ruins'))) {
    ruinHtml = `
      <div class="section-title">\ud83c\udff0 Ruin / Fortress Pick</div>
      <div class="ruin-card">
        <strong>${ruin.name}</strong> <span class="ruin-type">(${ruin.type})</span>
        <p>${ruin.description}</p>
        ${inlineThumb(p, ruin.img)}
      </div>`;
  }

  // Enrichment: weird cocktail bars (surfaced when user picks cocktail Q3b/Q3c)
  const bars = (typeof WEIRD_BARS !== 'undefined' && WEIRD_BARS[p.id]) || [];
  let barsHtml = '';
  if (bars.length && (userBundle.has('cocktails') || userBundle.has('weird-bars') || userBundle.has('mixology'))) {
    const items = bars.map(b => `
      <div class="bar-item">
        <div class="bar-name">\ud83c\udf78 ${b.name}${b.address ? ` <span class="bar-addr">${b.address}</span>` : ''}</div>
        <div class="bar-desc">${b.description}</div>
      </div>`).join('');
    barsHtml = `
      <div class="section-title">Weird Bars Pick${bars.length > 1 ? 's' : ''}</div>
      <div class="bars-card">${items}</div>`;
  }

  let vibeBadges = p.vibeTags.map(t => `<span class="vibe-tag">${t}</span>`).join('');

  // Enrichment: surprise fact
  const surprise = SURPRISE_FACTS[p.id];
  let surpriseHtml = '';
  if (surprise) {
    surpriseHtml = `
      <div class="surprise-card">
        <div class="surprise-label">Did you know?</div>
        ${surprise}
      </div>`;
  }

  // Secondary enrichments render as plain prose sub-sections (icon + italic label + body),
  // not boxed cards — the reviewer flagged too-many-look-alike cards as "flat density".

  // Coffee (secondary)
  const coffee = VERIFIED_COFFEE[p.id];
  let coffeeHtml = '';
  if (coffee) {
    const addr = coffee.address ? ` <em>(${coffee.address})</em>` : '';
    const note = coffee.note ? ` — <em>${coffee.note}</em>` : '';
    coffeeHtml = `<p class="subsection"><span class="subsection-label">\u2615 Coffee</span> <strong>${coffee.name}</strong>${addr} — ${coffee.order}${note}${inlineThumb(p, coffee.img)}</p>`;
  }

  // Pastry (secondary; always has data in p.pastry)
  const pastryV = VERIFIED_PASTRY[p.id];
  let pastryHtml = '';
  if (pastryV) {
    const addr = pastryV.address ? ` <em>(${pastryV.address})</em>` : '';
    pastryHtml = `<p class="subsection"><span class="subsection-label">\ud83c\udf70 Pastry & Sweets</span> <strong>${pastryV.name}</strong>${addr} — ${pastryV.item}${inlineThumb(p, pastryV.img)}<br><span class="subsection-detail">${p.pastry}</span></p>`;
  } else if (p.pastry) {
    pastryHtml = `<p class="subsection"><span class="subsection-label">\ud83c\udf70 Pastry & Sweets</span> ${p.pastry}</p>`;
  }

  // Japanese (secondary) — suppress entirely when the note says "None..." and there's no verified venue
  const jpn = VERIFIED_JAPANESE[p.id];
  let japaneseHtml = '';
  const japaneseNoneText = p.japanese && /^none\b/i.test(p.japanese.trim());
  if (jpn) {
    const addr = jpn.address ? ` <em>(${jpn.address})</em>` : '';
    const note = jpn.note ? ` — <em>${jpn.note}</em>` : '';
    japaneseHtml = `<p class="subsection"><span class="subsection-label">\ud83c\udf5c Japanese</span> <strong>${jpn.name}</strong>${addr} — ${jpn.order}${note}${inlineThumb(p, jpn.img)}</p>`;
  } else if (p.japanese && !japaneseNoneText) {
    japaneseHtml = `<p class="subsection"><span class="subsection-label">\ud83c\udf5c Japanese</span> ${p.japanese}</p>`;
  }

  // Where to Stay — up to 3 clearly-labelled options. Each can optionally
  // carry an img + inline thumb. Base pick (p.hotel) is always shown; the
  // other two (treat / smart) surface when data exists.
  const hotels = VERIFIED_HOTELS[p.id] || {};
  const hotelRows = [];
  // Base pick (always present)
  hotelRows.push({ tier: 'Base pick', tierClass: 'base', text: p.hotel, img: hotels.baseImg });
  // Treat yourself (luxury upgrade) — value can be string or object
  if (hotels.treat) {
    const treat = typeof hotels.treat === 'object' ? hotels.treat : { text: hotels.treat };
    hotelRows.push({ tier: 'Treat yourself', tierClass: 'treat', text: treat.text, img: treat.img });
  }
  // Smart value (budget option)
  if (hotels.smart) {
    const smart = typeof hotels.smart === 'object' ? hotels.smart : { text: hotels.smart };
    hotelRows.push({ tier: 'Smart value', tierClass: 'smart', text: smart.text, img: smart.img });
  }
  const hotelHtml = `
    <div class="hotels-stack">
      ${hotelRows.map(h => `
        <div class="hotel-row hotel-${h.tierClass}">
          <div class="hotel-tier">${h.tier}</div>
          <div class="hotel-body">${h.text}${inlineThumb(p, h.img)}</div>
        </div>
      `).join('')}
    </div>`;

  // Best time + 2026 pick merged into one unit (the reviewer flagged two
  // stacked boxes as "forgot to delete one"). 2026 is an inset.
  const weekend = BEST_WEEKENDS_2026[p.id];
  const bestTimeHtml = `
    <div class="best-time">
      <p class="best-time-main">${p.bestTime}</p>
      ${weekend ? `<div class="best-time-2026"><span class="best-time-year">${weekend.dates}, 2026</span> — ${weekend.why}</div>` : ''}
    </div>`;

  // Enrichment: itinerary
  const itin = ITINERARIES[p.id];
  let itineraryHtml = '';
  if (itin) {
    let daysHtml = itin.days.map(day => {
      let blocksHtml = day.blocks.map(b => `
        <div class="itinerary-block">
          <span class="itinerary-time">${b.time}</span>
          <span>${b.plan}</span>
          <span class="itinerary-note">${b.note}</span>
        </div>
      `).join('');
      return `<div class="itinerary-day"><h5>${day.label}</h5>${blocksHtml}</div>`;
    }).join('');

    itineraryHtml = `
      <div class="itinerary-section">
        <div class="section-title">Sample Itinerary</div>
        <button class="itinerary-toggle" onclick="this.nextElementSibling.classList.toggle('open'); this.textContent = this.nextElementSibling.classList.contains('open') ? 'Hide Itinerary' : 'Show Day-by-Day Plan';">Show Day-by-Day Plan</button>
        <div class="itinerary-content">${daysHtml}</div>
      </div>`;
  }

  // Safety net (V2-C): when Fede was flexible on the primary vibe, the
  // feasibility guarantee doesn't apply. Flag this honestly instead of
  // pretending the destination is a strong match.
  const flexibleVibe = answers[3] === "_skip";
  const flexibleNote = flexibleVibe
    ? `<div class="flexible-note">You said you were flexible on vibe \u2014 this is our best overall pick from your constraints, not a strong vibe match.</div>`
    : '';

  return `
    <div class="proposal-card">
      ${galleryHtml}
      <h3>${p.name}</h3>
      <p class="proposal-country">${p.country}</p>
      ${flexibleNote}
      ${surpriseHtml}
      <p class="pitch">${p.pitch}</p>

      <div class="section-title">How to Get There</div>
      <div class="transport">${p.transport}</div>

      <div class="section-title">Must-Do Highlights</div>
      <ul class="highlight-list">${highlightItems}</ul>

      ${ruinHtml}
      ${sweetHtml}
      ${barsHtml}

      <div class="section-title">Where to Stay</div>
      ${hotelHtml}

      ${(coffeeHtml || pastryHtml || japaneseHtml) ? `
        <div class="section-title">Tastes on the Ground</div>
        <div class="subsections">
          ${coffeeHtml}
          ${pastryHtml}
          ${japaneseHtml}
        </div>
      ` : ''}

      <div class="section-title">Best Time to Go</div>
      ${bestTimeHtml}

      <div class="section-title">Budget Estimate</div>
      <table class="budget-table">${budgetRows}</table>

      <div class="vibe-tags">${vibeBadges}</div>
      ${itineraryHtml}
    </div>
  `;
}

function renderRunnerCard(p) {
  let vibeBadges = p.vibeTags.map(t => `<span class="vibe-tag">${t}</span>`).join('');
  const weekend = BEST_WEEKENDS_2026[p.id];
  const surprise = SURPRISE_FACTS[p.id];
  const coffee = VERIFIED_COFFEE[p.id];
  const gallery = GALLERIES[p.id];
  let thumbHtml = '';
  if (gallery && gallery.photos && gallery.photos.length > 0) {
    const basePath = `images/${p.id}-${gallery.slug}`;
    thumbHtml = `<figure class="runner-thumb"><img src="${basePath}/${gallery.photos[0].file}" alt="${p.name}" loading="lazy"></figure>`;
  }
  let extras = '';
  if (weekend) extras += `<div style="margin-top:0.3rem;font-size:0.9rem;"><strong>2026 pick:</strong> ${weekend.dates} — ${weekend.why}</div>`;
  if (coffee) extras += `<div style="margin-top:0.3rem;font-size:0.9rem;">\u2615 <strong>${coffee.name}</strong>${coffee.address ? ' (' + coffee.address + ')' : ''}</div>`;
  if (surprise) extras += `<div style="margin-top:0.4rem;font-size:0.85rem;color:var(--accent);font-style:italic;">"${surprise.length > 120 ? surprise.slice(0, 120) + '...' : surprise}"</div>`;
  return `
    <div class="runner-card">
      ${thumbHtml}
      <div class="runner-body">
        <h4>${p.name} <span class="runner-country">${p.country}</span></h4>
        <p class="pitch">${p.pitch}</p>
        <div class="transport">${p.transport}</div>
        <div style="margin-top:0.5rem;font-size:0.95rem;"><strong>Stay:</strong> ${p.hotel}</div>
        <div style="margin-top:0.3rem;font-size:0.95rem;"><strong>Best time:</strong> ${p.bestTime}</div>
        ${extras}
        <div class="vibe-tags" style="margin-top:0.6rem;">${vibeBadges}</div>
      </div>
    </div>
  `;
}

// ============================================================
// RUNNERS TOGGLE
// ============================================================
function toggleRunners() {
  const list = document.getElementById('runners-list');
  const btn = document.getElementById('runners-toggle');
  list.classList.toggle('open');
  btn.textContent = list.classList.contains('open') ? 'Hide Other Options' : 'See Other Options';
}

// ============================================================
// RESTART
// ============================================================
function restart() {
  answers = {};
  currentQ = 0;
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('runners-list').classList.remove('open');
  setCat('idle');
  showScreen('welcome');
}

// ============================================================
// INIT
// ============================================================
setCat('idle');
</script>
