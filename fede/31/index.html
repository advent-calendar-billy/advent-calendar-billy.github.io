<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where Will You Go?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Where Will You Go? — V2 Styles
   Travel-journal aesthetic, refined. Muted terracotta + deep teal.
   Handwritten display type (Caveat, Patrick Hand) + ui-serif for prose.
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Paper */
  --parchment:       #fbf3df;
  --parchment-dark:  #ecdfc3;
  --parchment-deep:  #d9c8a0;

  /* Ink */
  --ink:         #2f2422;
  --ink-light:   #7a6a66;
  --ink-muted:   #a69a96;

  /* Accents (muted, grown-up) */
  --accent:      #a34f3a;  /* terracotta */
  --accent-soft: #c26b52;
  --stamp-blue:  #2e5b66;  /* deep teal replacing navy */
  --stamp-green: #4a7051;  /* sage */
  --stamp-red:   #8c4432;
  --gold:        #b88847;

  /* Backgrounds */
  --tag-bg:      #f0e4c9;
  --spotlight:   #fbeac4;
  --spotlight-edge: #e8c98a;

  /* Shadows (warm, layered) */
  --shadow-1: 0 1px 2px rgba(60,47,47,0.06), 0 1px 1px rgba(60,47,47,0.04);
  --shadow-2: 0 2px 6px rgba(60,47,47,0.08), 0 1px 2px rgba(60,47,47,0.05);
  --shadow-3: 0 8px 24px rgba(60,47,47,0.10), 0 2px 4px rgba(60,47,47,0.06);

  /* Typography */
  --font-display: 'Caveat', cursive;
  --font-hand:    'Patrick Hand', cursive;
  --font-prose:   ui-serif, Georgia, 'Iowan Old Style', 'Times New Roman', serif;

  /* Motion */
  --ease-out:     cubic-bezier(0.2, 0.8, 0.2, 1);
  --ease-soft:    cubic-bezier(0.4, 0.1, 0.3, 1);
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-hand);
  background:
    radial-gradient(1200px 800px at 20% -10%, rgba(255,230,170,0.18), transparent 60%),
    radial-gradient(900px 700px at 110% 110%, rgba(180,150,110,0.10), transparent 60%),
    var(--parchment);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
  font-size: 17px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* ---------- Screens ---------- */
.screen {
  display: none;
  min-height: 100vh;
  padding: 2.5rem 1rem 4rem;
  animation: fadeIn 0.5s var(--ease-out);
}
.screen.active {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.25rem;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ---------- Progress bar ---------- */
.progress-bar {
  position: fixed; top: 0; left: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--stamp-blue), var(--stamp-green), var(--accent));
  transition: width 0.5s var(--ease-out);
  z-index: 100;
}

/* ---------- Welcome (minimalist Feliz cumple! screen) ---------- */
#welcome { text-align: center; gap: 1.6rem; }
.welcome-sticker {
  width: clamp(120px, 22vw, 180px);
  height: auto;
  display: block;
  filter: drop-shadow(0 6px 16px rgba(60,47,47,0.18));
  animation: stickerPop 0.7s cubic-bezier(0.18, 1.2, 0.3, 1.1) both;
}
@keyframes stickerPop {
  0%   { opacity: 0; transform: scale(0.7) translateY(16px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
#welcome h1 {
  font-family: var(--font-display);
  font-size: clamp(3rem, 9vw, 5rem);
  font-weight: 700;
  color: var(--ink);
  line-height: 1.05;
  letter-spacing: -0.01em;
  animation: fadeIn 0.6s ease 0.2s both;
}
#welcome .btn-start {
  animation: fadeIn 0.6s ease 0.45s both;
}

/* ---------- Postcard (quiz question card) ---------- */
.postcard {
  background: #fff;
  border: 1px solid var(--parchment-dark);
  border-radius: 10px;
  box-shadow: var(--shadow-3);
  max-width: 560px;
  width: 100%;
  padding: 2.25rem 2rem 1.75rem;
  position: relative;
  text-align: center;
}
.postcard::before {
  /* subtle circular postmark — concentric rings suggest a stamped mail mark */
  content: '';
  position: absolute; top: 12px; right: 12px;
  width: 54px; height: 54px;
  border-radius: 50%;
  opacity: 0.16;
  transform: rotate(-8deg);
  background:
    radial-gradient(circle, transparent 12px, var(--stamp-blue) 12px, var(--stamp-blue) 13px, transparent 13px),
    radial-gradient(circle, transparent 20px, var(--stamp-blue) 20px, var(--stamp-blue) 21px, transparent 21px),
    radial-gradient(circle, transparent 25px, var(--stamp-blue) 25px, var(--stamp-blue) 26px, transparent 26px);
}
.postcard h2 {
  font-family: var(--font-display);
  font-size: clamp(1.5rem, 4vw, 2.1rem);
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 1.3rem;
  line-height: 1.15;
}
.q-number {
  font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  font-size: 0.7rem;
  color: var(--ink-muted);
  text-transform: uppercase;
  letter-spacing: 0.24em;
  margin-bottom: 0.35rem;
  font-weight: 600;
}
.q-kind {
  font-family: var(--font-display);
  font-size: 1.05rem;
  margin-bottom: 0.3rem;
  letter-spacing: 0.02em;
  font-weight: 600;
}
.q-kind.commitment {
  /* "I choose" — this decides it. Terracotta to signal consequence. */
  color: var(--accent);
}
.q-kind.preference {
  /* "I prefer" — a lean, not a lock. Muted + italic. */
  color: var(--ink-light);
  font-style: italic;
  font-weight: 500;
}

/* ---------- Answer buttons ---------- */
.answers { display: flex; flex-direction: column; gap: 0.6rem; width: 100%; margin-top: 0.4rem; }
.answer-btn {
  font-family: var(--font-hand);
  font-size: 1.05rem;
  padding: 0.9rem 1.1rem;
  border: 1px solid var(--parchment-deep);
  border-radius: 6px;
  background: var(--parchment);
  color: var(--ink);
  cursor: pointer;
  transition: all 0.2s var(--ease-out);
  text-align: left;
  line-height: 1.35;
}
.answer-btn:hover:not(:disabled) {
  border-color: var(--stamp-blue);
  background: #fff;
  transform: translateX(4px);
  box-shadow: var(--shadow-2);
}
.answer-btn:active:not(:disabled) { transform: translateX(4px) scale(0.99); }

/* V2-C: display label + match-count chip side-by-side */
.answer-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.7rem;
}
.answer-label { flex: 1; }
.answer-chip {
  font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 0.18rem 0.55rem;
  border-radius: 3px;
  white-space: nowrap;
  flex-shrink: 0;
}
.answer-chip.ok {
  background: rgba(74, 112, 81, 0.12);
  color: var(--stamp-green);
}
.answer-chip.zero {
  background: rgba(163, 79, 58, 0.14);
  color: var(--accent);
}
.answer-chip.weak {
  background: rgba(184, 136, 71, 0.15);
  color: var(--gold);
  font-style: italic;
  letter-spacing: 0.08em;
}
.answer-chip.skip {
  background: rgba(122, 106, 102, 0.12);
  color: var(--ink-light);
  font-style: italic;
  letter-spacing: 0.08em;
}

/* Selected state for multi-select options */
.answer-btn.selected {
  border-color: var(--accent);
  background: #fff;
  box-shadow: inset 0 0 0 1px var(--accent), var(--shadow-2);
}
.answer-btn.selected .answer-label {
  color: var(--accent);
  font-weight: 600;
}
.answer-btn.selected .answer-label::before {
  content: '\2713\00a0';  /* ✓ */
  color: var(--accent);
  font-weight: 700;
  margin-right: 0.15em;
}

/* Multi-select helper text below options */
.multi-hint {
  font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
  font-size: 0.72rem;
  color: var(--ink-muted);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  text-align: center;
  margin-top: 0.8rem;
  margin-bottom: 0.3rem;
  font-weight: 600;
}

/* Continue button for multi-select questions */
.btn-continue {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 700;
  padding: 0.65rem 1.8rem;
  border: 2px solid var(--stamp-blue);
  border-radius: 8px;
  background: var(--stamp-blue);
  color: #fff;
  cursor: pointer;
  margin-top: 0.4rem;
  width: 100%;
  transition: all 0.2s var(--ease-out);
  letter-spacing: 0.02em;
  box-shadow: var(--shadow-1);
}
.btn-continue:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: var(--shadow-2);
}
.btn-continue:disabled {
  opacity: 0.35;
  cursor: not-allowed;
  background: var(--parchment);
  color: var(--ink-muted);
  border-color: var(--parchment-deep);
}

/* Dead-end: disabled, muted, strikethrough label */
.answer-btn.dead-end,
.answer-btn:disabled {
  cursor: not-allowed;
  opacity: 0.55;
  background: var(--parchment);
}
.answer-btn.dead-end .answer-label {
  text-decoration: line-through;
  text-decoration-thickness: 1px;
  color: var(--ink-muted);
}
.answer-btn.dead-end:hover {
  transform: none;
  border-color: var(--parchment-deep);
  background: var(--parchment);
  box-shadow: none;
}

/* ---------- Start button ---------- */
.btn-start {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 700;
  padding: 0.7rem 2.3rem;
  border: 2px solid var(--accent);
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  transition: all 0.2s var(--ease-out);
  letter-spacing: 0.02em;
  box-shadow: var(--shadow-2);
}
.btn-start:hover {
  background: var(--accent-soft);
  border-color: var(--accent-soft);
  transform: translateY(-2px);
  box-shadow: var(--shadow-3);
}

/* ---------- Reveal / stamp ---------- */
#reveal { text-align: center; gap: 0.8rem; position: relative; }
#reveal::before,
#reveal::after {
  /* sparse decorative flight-path dots to fill the desktop void */
  content: '';
  position: absolute;
  width: 32vw; max-width: 420px; height: 1px;
  background-image: radial-gradient(circle, var(--parchment-deep) 1px, transparent 1.5px);
  background-size: 14px 1px;
  background-repeat: repeat-x;
  opacity: 0.7;
  pointer-events: none;
}
#reveal::before { top: 38%; left: 0; transform: rotate(-4deg); }
#reveal::after  { top: 56%; right: 0; transform: rotate(4deg); }
.stamp-container { position: relative; display: inline-block; padding: 0.6rem 1rem 1rem; }
.passport-stamp {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(2.4rem, 7vw, 4.2rem);
  color: var(--stamp-blue);
  border: 5px solid var(--stamp-blue);
  border-radius: 10px;
  padding: 1rem 2.4rem;
  display: inline-block;
  transform: rotate(-5deg);
  animation: stampIn 0.7s var(--ease-out) forwards;
  opacity: 0;
  text-transform: uppercase;
  letter-spacing: 3px;
  position: relative;
  /* ink-bleed feel */
  filter: drop-shadow(0 0 0.5px rgba(46,91,102,0.6));
}
.passport-stamp::after {
  content: 'APPROVED';
  position: absolute;
  bottom: -14px; right: -22px;
  font-family: var(--font-display);
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--stamp-green);
  border: 2px solid var(--stamp-green);
  border-radius: 50%;
  padding: 0.35rem 0.6rem;
  transform: rotate(12deg);
  letter-spacing: 1.5px;
  background: rgba(255,252,240,0.7);
}
@keyframes stampIn {
  0%   { opacity: 0; transform: rotate(-5deg) scale(2.6); }
  55%  { opacity: 1; transform: rotate(-5deg) scale(0.92); }
  100% { opacity: 1; transform: rotate(-5deg) scale(1); }
}
.reveal-subtitle {
  font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
  font-size: 0.85rem;
  color: var(--ink-muted);
  animation: fadeIn 0.6s ease 0.4s both;
  text-transform: uppercase;
  letter-spacing: 0.28em;
  font-weight: 600;
}
.reveal-country {
  font-family: var(--font-display);
  font-size: 1.6rem;
  color: var(--stamp-green);
  animation: fadeIn 0.6s ease 0.55s both;
  font-weight: 700;
  letter-spacing: 0.04em;
}
.reveal-nudge {
  margin-top: 0.6rem;
  font-family: ui-sans-serif, system-ui, sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--ink-muted);
  animation: fadeIn 0.6s ease 0.8s both;
}
#reveal .btn-start {
  animation: fadeIn 0.6s ease 0.7s both !important;
}

/* ---------- Proposal card ---------- */
#proposal-section {
  padding: 1rem 1rem 4rem;
  animation: fadeIn 0.5s var(--ease-out);
  width: 100%;
  display: flex; justify-content: center;
}
.proposal-card {
  background: #fff;
  border: 1px solid var(--parchment-dark);
  border-radius: 12px;
  box-shadow: var(--shadow-3);
  max-width: 680px;
  width: 100%;
  margin: 1rem auto;
  padding: 0 0 2rem;
  position: relative;
  overflow: hidden;
}
.proposal-card > h3,
.proposal-card > .proposal-country,
.proposal-card > .pitch,
.proposal-card > .surprise-card,
.proposal-card > .section-title,
.proposal-card > .transport,
.proposal-card > .highlight-list,
.proposal-card > .info-block,
.proposal-card > .best-time,
.proposal-card > .weekend-2026,
.proposal-card > .coffee-card,
.proposal-card > .sweet-tour-card,
.proposal-card > .ruin-card,
.proposal-card > .subsections,
.proposal-card > .budget-table,
.proposal-card > .vibe-tags,
.proposal-card > .itinerary-section { margin-left: 1.75rem; margin-right: 1.75rem; }

.proposal-card h3 {
  font-family: var(--font-display);
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.05;
  margin-top: 1.2rem;
  margin-bottom: 0.2rem;
  letter-spacing: -0.01em;
}
.proposal-country {
  font-family: var(--font-display);
  font-size: 1.15rem;
  color: var(--stamp-green);
  margin-bottom: 0.9rem;
  letter-spacing: 0.03em;
}
.proposal-card .pitch {
  font-family: var(--font-prose);
  font-size: 1.02rem;
  color: var(--ink);
  margin-bottom: 1.3rem;
  line-height: 1.65;
}
.proposal-card .section-title {
  font-family: var(--font-display);
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--stamp-blue);
  margin: 1.3rem auto 0.4rem;
  padding-bottom: 0.25rem;
  border-bottom: 1px dashed var(--parchment-deep);
  letter-spacing: 0.01em;
}
.proposal-card .transport {
  background: var(--parchment);
  border-radius: 6px;
  padding: 0.8rem 1rem;
  margin: 0.4rem auto;
  font-family: var(--font-prose);
  font-size: 0.98rem;
  line-height: 1.5;
}

/* Highlights & spotlight */
.highlight-list { list-style: none; padding: 0; }
.highlight-list li {
  padding: 0.65rem 0.2rem;
  border-bottom: 1px dotted var(--parchment-deep);
  font-family: var(--font-prose);
  font-size: 0.98rem;
  line-height: 1.5;
  display: block;
  position: relative;
}
.highlight-list li:last-child { border-bottom: none; }
.highlight-list li strong { color: var(--stamp-blue); font-weight: 600; }

.highlight-list li.spotlit {
  background: linear-gradient(90deg, var(--spotlight) 0%, rgba(251,234,196,0.25) 100%);
  border-left: 4px solid var(--accent);
  padding-left: 0.85rem;
  padding-right: 0.5rem;
  margin: 0.3rem -0.2rem 0.3rem -0.7rem;
  border-radius: 3px 8px 8px 3px;
}
.highlight-list li.spotlit strong { color: var(--accent); }
.spotlight-chip {
  display: inline-block;
  margin-right: 0.5rem;
  margin-left: 0;
  font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  color: #fff;
  background: var(--accent);
  padding: 0.15rem 0.55rem;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  vertical-align: 0.15em;
}

/* Hidden-gem highlight treatment (Q6 "hidden gems" answer).
   Active = user picked hidden gems; highlight leads the list with its own chip.
   Dormant = user picked classics; hidden entries still render but softer/italic. */
.hidden-chip {
  display: inline-block;
  margin-right: 0.5rem;
  font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  color: #fff;
  background: var(--stamp-blue);
  padding: 0.15rem 0.55rem 0.15rem 0.5rem;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  vertical-align: 0.15em;
  white-space: nowrap;
}
.highlight-list li.hidden-active {
  background: linear-gradient(90deg, #dfeaed 0%, rgba(223,234,237,0.2) 100%);
  border-left: 4px solid var(--stamp-blue);
  padding-left: 0.85rem;
  padding-right: 0.5rem;
  margin: 0.3rem -0.2rem 0.3rem -0.7rem;
  border-radius: 3px 8px 8px 3px;
}
.highlight-list li.hidden-active strong { color: var(--stamp-blue); }
.highlight-list li.hidden-dormant {
  color: var(--ink-light);
}
.highlight-list li.hidden-dormant strong { color: var(--ink-light); font-weight: 500; font-style: italic; }

/* Info blocks, budget, vibe tags */
.info-block {
  background: var(--parchment);
  border-radius: 6px;
  padding: 0.8rem 1rem;
  margin: 0.4rem auto;
  font-family: var(--font-prose);
  font-size: 0.96rem;
  line-height: 1.55;
}
.budget-table {
  width: calc(100% - 3.5rem);
  margin: 0.4rem 1.75rem;
  border-collapse: collapse;
  font-family: var(--font-prose);
  font-size: 0.95rem;
}
.budget-table td {
  padding: 0.5rem 0.4rem;
  border-bottom: 1px dotted var(--parchment-deep);
}
.budget-table td:last-child { text-align: right; font-weight: 600; }
.budget-table tr:last-child td { border-bottom: none; font-weight: 700; color: var(--accent); }
.vibe-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 1rem; }
.vibe-tag {
  background: var(--tag-bg);
  border-radius: 16px;
  padding: 0.25rem 0.75rem;
  font-family: var(--font-hand);
  font-size: 0.86rem;
  color: var(--ink-light);
  border: 1px solid transparent;
}

.best-time {
  background: linear-gradient(135deg, #eef3e9, #f5f1e1);
  border-radius: 6px;
  padding: 0.85rem 1rem;
  margin: 0.4rem auto;
  font-family: var(--font-prose);
  font-size: 0.96rem;
  border-left: 3px solid var(--stamp-green);
  line-height: 1.55;
}
.best-time-main { color: var(--ink); }
.best-time-2026 {
  margin-top: 0.55rem;
  padding-top: 0.55rem;
  border-top: 1px dashed rgba(74, 112, 81, 0.35);
  font-size: 0.92rem;
  color: var(--ink-light);
}
.best-time-year {
  font-family: var(--font-display);
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--stamp-green);
  letter-spacing: 0.03em;
}

/* Surprise fact, coffee, weekend, sweet, ruin */
.surprise-card {
  background: linear-gradient(135deg, #f4e4d2, #fbf0e0);
  border-radius: 8px;
  padding: 0.95rem 1.1rem;
  margin: 0.8rem auto;
  border-left: 3px solid var(--accent);
  font-family: var(--font-prose);
  font-size: 0.95rem;
  line-height: 1.55;
}
.flexible-note {
  background: rgba(122, 106, 102, 0.08);
  border: 1px dashed var(--parchment-deep);
  border-radius: 6px;
  padding: 0.6rem 0.9rem;
  margin: 0.8rem auto;
  font-family: var(--font-prose);
  font-size: 0.85rem;
  color: var(--ink-light);
  font-style: italic;
  line-height: 1.5;
}
.proposal-card > .flexible-note { margin-left: 1.75rem; margin-right: 1.75rem; }
@media (max-width: 640px) {
  .proposal-card > .flexible-note { margin-left: 1.1rem; margin-right: 1.1rem; }
}
.surprise-card .surprise-label {
  font-family: var(--font-display);
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 0.25rem;
  letter-spacing: 0.03em;
}

/* Secondary enrichment sections: plain prose with italic label, no boxed card.
   Tiers the density so the proposal reads as layered rather than a wall of cards. */
.subsections {
  margin: 0.2rem auto 0.6rem;
  padding: 0.2rem 0;
}
.proposal-card > .subsections { margin-left: 1.75rem; margin-right: 1.75rem; }
.subsection {
  font-family: var(--font-prose);
  font-size: 0.96rem;
  line-height: 1.6;
  color: var(--ink);
  padding: 0.4rem 0;
  border-bottom: 1px dotted var(--parchment-deep);
}
.subsection:last-child { border-bottom: none; }
.subsection-label {
  font-family: var(--font-hand);
  font-weight: 600;
  color: var(--stamp-blue);
  font-style: italic;
  margin-right: 0.3rem;
  letter-spacing: 0.01em;
}
.subsection strong { color: var(--ink); font-weight: 600; }
.subsection em { color: var(--ink-light); font-style: italic; }
.subsection-detail {
  display: block;
  margin-top: 0.2rem;
  font-size: 0.85rem;
  color: var(--ink-light);
  font-style: italic;
}

/* (legacy coffee-card retained in case other code references it, but
   Tastes-on-the-Ground now uses .subsection) */
.coffee-card {
  background: linear-gradient(135deg, #ece1d4, #f7ecd9);
  border-radius: 8px;
  padding: 0.8rem 1rem;
  margin: 0.4rem auto;
  border-left: 3px solid #8c6954;
  font-family: var(--font-prose);
  font-size: 0.95rem;
}
.coffee-card .coffee-name { font-weight: 600; color: #4e342e; }

.weekend-2026 {
  background: linear-gradient(135deg, #dfeaed, #e6ebe9);
  border-radius: 8px;
  padding: 0.8rem 1rem;
  margin: 0.4rem auto;
  border-left: 3px solid var(--stamp-blue);
  font-family: var(--font-prose);
  font-size: 0.95rem;
}
.weekend-2026 .weekend-dates {
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--stamp-blue);
}

.sweet-tour-card {
  background: linear-gradient(135deg, #f6e3d3, #fbeac4);
  border-radius: 8px;
  padding: 0.9rem 1.1rem;
  margin: 0.4rem auto;
  border-left: 3px solid var(--accent);
  font-family: var(--font-prose);
  font-size: 0.95rem;
}
.sweet-tour-card strong { display: block; color: var(--accent); font-size: 1.05rem; margin-bottom: 0.3rem; }
.sweet-tour-card p { margin-bottom: 0.5rem; line-height: 1.55; }
.sweet-tour-meta { display: flex; flex-wrap: wrap; gap: 0.75rem; font-size: 0.85rem; color: var(--ink-light); }
.sweet-tour-meta span { white-space: nowrap; }

.ruin-card {
  background: linear-gradient(135deg, #e9e2d0, #f2e7cb);
  border-radius: 8px;
  padding: 0.9rem 1.1rem;
  margin: 0.4rem auto;
  border-left: 3px solid var(--stamp-blue);
  font-family: var(--font-prose);
  font-size: 0.95rem;
}
.ruin-card strong { font-size: 1.05rem; color: var(--stamp-blue); }
.ruin-card .ruin-type {
  font-family: var(--font-hand);
  font-size: 0.82rem;
  color: var(--ink-light);
  font-style: italic;
  margin-left: 0.4rem;
}
.ruin-card p { margin-top: 0.35rem; line-height: 1.55; }

/* Hotels — three tiers, clearly labelled. Base pick is the default; treat
   and smart are optional alternates. Each renders as a row with a small
   tier kicker above and the option text (plus optional inline thumb) below. */
.hotels-stack { display: flex; flex-direction: column; gap: 0.55rem; }
.hotel-row {
  padding: 0.7rem 0.95rem;
  border-radius: 6px;
  background: var(--parchment);
  border-left: 3px solid var(--parchment-deep);
  font-family: var(--font-prose);
  font-size: 0.95rem;
  line-height: 1.5;
}
.hotel-row.hotel-base  { border-left-color: var(--stamp-blue); }
.hotel-row.hotel-treat { border-left-color: var(--accent); background: linear-gradient(135deg, #f4e4d2, #fbf0e0); }
.hotel-row.hotel-smart { border-left-color: var(--stamp-green); background: linear-gradient(135deg, #eef3e9, #f5f1e1); }
.hotel-tier {
  font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ink-muted);
  margin-bottom: 0.25rem;
}
.hotel-row.hotel-base  .hotel-tier { color: var(--stamp-blue); }
.hotel-row.hotel-treat .hotel-tier { color: var(--accent); }
.hotel-row.hotel-smart .hotel-tier { color: var(--stamp-green); }
.hotel-body { color: var(--ink); }
.hotel-row .inline-thumb { margin-top: 0.4rem; }

/* Weird bars card — one entry per venue, stacked */
.bars-card {
  background: linear-gradient(135deg, #e7dccd, #efe7d2);
  border-radius: 8px;
  padding: 0.9rem 1.1rem;
  margin: 0.4rem auto;
  border-left: 3px solid var(--stamp-blue);
  font-family: var(--font-prose);
  font-size: 0.95rem;
}
.bar-item { padding: 0.5rem 0; border-bottom: 1px dotted rgba(46,91,102,0.25); }
.bar-item:first-child { padding-top: 0; }
.bar-item:last-child { padding-bottom: 0; border-bottom: none; }
.bar-name { font-weight: 600; color: var(--stamp-blue); margin-bottom: 0.15rem; }
.bar-addr { font-family: var(--font-hand); font-size: 0.85rem; color: var(--ink-light); font-weight: 400; font-style: italic; }
.bar-desc { color: var(--ink); line-height: 1.5; }
.proposal-card > .bars-card { margin-left: 1.75rem; margin-right: 1.75rem; }
@media (max-width: 640px) {
  .proposal-card > .bars-card { margin-left: 1.1rem; margin-right: 1.1rem; }
}

/* ---------- Gallery ---------- */
.gallery-hero {
  position: relative;
  margin: 0 0 0;
  aspect-ratio: 3 / 2;
  overflow: hidden;
  border-radius: 12px 12px 0 0;
  background: var(--parchment-dark);
}
.gallery-hero img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.gallery-hero figcaption {
  position: absolute; left: 0; right: 0; bottom: 0;
  padding: 0.9rem 1.25rem 0.7rem;
  background: linear-gradient(to top, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0) 100%);
  color: #fff;
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 0.75rem;
  pointer-events: none;
}
.gallery-country {
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-shadow: 0 1px 3px rgba(0,0,0,0.35);
}
.gallery-credit {
  font-family: var(--font-prose);
  font-size: 0.72rem;
  opacity: 0.85;
  text-align: right;
  line-height: 1.3;
  max-width: 55%;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}
.gallery-thumbs {
  display: flex;
  gap: 0.5rem;
  padding: 0.8rem 1.75rem 0.2rem;
  overflow-x: auto;
  scrollbar-width: thin;
}
.gallery-thumb {
  flex: 0 0 auto;
  width: 110px;
  height: 74px;
  border: 1px solid var(--parchment-deep);
  border-radius: 6px;
  overflow: hidden;
  padding: 0;
  cursor: pointer;
  background: var(--parchment);
  transition: transform 0.2s var(--ease-out), box-shadow 0.2s var(--ease-out), border-color 0.2s;
}
.gallery-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.gallery-thumb:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-2);
  border-color: var(--stamp-blue);
}

/* Gallery lightbox overlay */
.gallery-lightbox {
  position: fixed; inset: 0;
  background: rgba(47, 36, 34, 0.88);
  display: none;
  align-items: center; justify-content: center;
  z-index: 200;
  padding: 2rem;
  cursor: pointer;
  animation: fadeIn 0.25s ease;
}
.gallery-lightbox.open { display: flex; }
.gallery-lightbox img {
  max-width: 92vw; max-height: 80vh;
  border-radius: 6px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.gallery-lightbox .lightbox-caption {
  position: absolute; left: 0; right: 0; bottom: 1.5rem;
  text-align: center;
  color: #fff;
  font-family: var(--font-prose);
  font-size: 0.9rem;
  padding: 0 1.5rem;
  opacity: 0.88;
}
.gallery-lightbox .lightbox-credit {
  position: absolute; left: 0; right: 0; bottom: 0.6rem;
  text-align: center;
  color: rgba(255,255,255,0.6);
  font-family: var(--font-prose);
  font-size: 0.72rem;
  letter-spacing: 0.02em;
  padding: 0 1.5rem;
}

/* ---------- Inline thumb (click to open lightbox) ---------- */
.inline-thumb {
  display: inline-block;
  padding: 0;
  margin: 0 0.35rem 0.25rem 0;
  width: 78px;
  height: 78px;
  border: 1px solid var(--parchment-deep);
  border-radius: 6px;
  overflow: hidden;
  background: var(--parchment);
  cursor: zoom-in;
  vertical-align: middle;
  transition: transform 0.2s var(--ease-out), box-shadow 0.2s var(--ease-out), border-color 0.2s;
  flex-shrink: 0;
}
.inline-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.inline-thumb:hover {
  transform: translateY(-1px) scale(1.03);
  box-shadow: var(--shadow-2);
  border-color: var(--stamp-blue);
}
.inline-thumb:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
/* Highlights: thumbnail sits inline, at the end of the text */
.highlight-list li .inline-thumb { margin-left: 0.4rem; }
/* Cards (ruin / sweet-tour / bars): thumbnail in a row with content */
.ruin-card .inline-thumb,
.sweet-tour-card .inline-thumb,
.bars-card .inline-thumb,
.subsection .inline-thumb { margin-top: 0.4rem; }

/* ---------- Itinerary ---------- */
.itinerary-section { margin: 1rem 1.75rem 0; }
.itinerary-toggle {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 600;
  cursor: pointer;
  color: var(--stamp-blue);
  background: none;
  border: 1px dashed var(--parchment-deep);
  border-radius: 8px;
  padding: 0.65rem 1.2rem;
  width: 100%;
  text-align: center;
  transition: all 0.2s var(--ease-out);
}
.itinerary-toggle:hover { border-color: var(--stamp-blue); background: rgba(255,255,255,0.6); }
.itinerary-content { display: none; margin-top: 0.8rem; }
.itinerary-content.open { display: block; }
.itinerary-day {
  background: #fff;
  border: 1px solid var(--parchment-dark);
  border-radius: 8px;
  padding: 1rem 1.2rem;
  margin-bottom: 0.8rem;
}
.itinerary-day h5 {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--stamp-green);
  margin-bottom: 0.5rem;
  letter-spacing: 0.02em;
}
.itinerary-block {
  display: grid;
  grid-template-columns: 3.5rem 1fr;
  gap: 0.3rem 0.5rem;
  padding: 0.4rem 0;
  border-bottom: 1px dotted var(--parchment-deep);
  font-family: var(--font-prose);
  font-size: 0.92rem;
  line-height: 1.5;
}
.itinerary-block:last-child { border-bottom: none; }
.itinerary-time {
  font-family: 'SF Mono', Menlo, Consolas, monospace;
  font-size: 0.82rem;
  color: var(--stamp-blue);
  font-weight: 600;
  padding-top: 0.1rem;
}
.itinerary-note {
  font-size: 0.82rem;
  color: var(--ink-light);
  grid-column: 2;
  font-style: italic;
}

/* ---------- Combo trips ---------- */
.combo-section { margin: 1.5rem auto 0; max-width: 680px; width: 100%; padding: 0 1rem; }
.combo-card {
  background: #fff;
  border: 1px solid var(--parchment-dark);
  border-radius: 8px;
  padding: 0.8rem 1.1rem;
  margin-bottom: 0.55rem;
  box-shadow: var(--shadow-1);
}
.combo-card h5 {
  font-family: var(--font-display);
  font-size: 1.15rem;
  color: var(--stamp-blue);
  margin-bottom: 0.15rem;
  font-weight: 700;
}
.combo-card p { font-family: var(--font-prose); font-size: 0.92rem; color: var(--ink-light); line-height: 1.5; }

/* ---------- Runners-up ---------- */
.runners-up { max-width: 680px; width: 100%; margin: 1.5rem auto; padding: 0 1rem; }
.runners-toggle {
  font-family: var(--font-display);
  font-size: 1.25rem;
  font-weight: 700;
  cursor: pointer;
  color: var(--stamp-blue);
  background: rgba(255,255,255,0.45);
  border: 1px dashed var(--parchment-deep);
  border-radius: 8px;
  padding: 0.8rem 1.5rem;
  width: 100%;
  text-align: center;
  transition: all 0.2s var(--ease-out);
}
.runners-toggle:hover { border-color: var(--stamp-blue); background: #fff; }
.runners-list { display: none; margin-top: 1rem; }
.runners-list.open { display: block; }

.runner-card {
  background: #fff;
  border: 1px solid var(--parchment-dark);
  border-radius: 10px;
  padding: 1.2rem;
  margin-bottom: 1rem;
  box-shadow: var(--shadow-2);
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 1.1rem;
  align-items: start;
}
.runner-thumb {
  aspect-ratio: 3/2;
  overflow: hidden;
  border-radius: 6px;
  background: var(--parchment-dark);
  margin: 0;
}
.runner-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.runner-body { min-width: 0; }
.runner-card h4 {
  font-family: var(--font-display);
  font-size: 1.45rem;
  font-weight: 700;
  margin-bottom: 0.25rem;
  line-height: 1.1;
}
.runner-country {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 1rem;
  color: var(--stamp-green);
  margin-left: 0.35rem;
}
.runner-card .pitch {
  font-family: var(--font-prose);
  font-size: 0.95rem;
  color: var(--ink-light);
  margin-bottom: 0.5rem;
  line-height: 1.55;
}
.runner-card .transport {
  font-family: var(--font-prose);
  font-size: 0.88rem;
  background: var(--parchment);
  border-radius: 5px;
  padding: 0.45rem 0.7rem;
}

/* ---------- Restart ---------- */
.restart-btn {
  font-family: var(--font-display);
  font-size: 1.15rem;
  padding: 0.55rem 1.8rem;
  border: 1px dashed var(--ink-muted);
  border-radius: 8px;
  background: transparent;
  color: var(--ink-light);
  cursor: pointer;
  margin: 2rem auto;
  display: block;
  transition: all 0.2s var(--ease-out);
}
.restart-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ---------- Credits footer ---------- */
.credits-footer {
  max-width: 680px;
  margin: 1rem auto 3rem;
  padding: 0 1rem;
  text-align: center;
  font-family: var(--font-prose);
  font-size: 0.82rem;
  color: var(--ink-muted);
  line-height: 1.5;
}
.credits-footer a { color: var(--stamp-blue); text-decoration: none; border-bottom: 1px dotted var(--stamp-blue); }

/* ============================================================
   Inline SVG cat — mood-driven via class on .cat-svg root
   ============================================================ */
.cat-card {
  position: fixed;
  bottom: 0.75rem;
  right: 0.75rem;
  width: 76px;
  padding: 0;
  background: transparent;
  border: none;
  box-shadow: none;
  z-index: 50;
  user-select: none;
  opacity: 0.82;
  transition: opacity 0.3s var(--ease-out);
  filter: drop-shadow(0 2px 4px rgba(60,47,47,0.12));
}
.cat-card:hover { opacity: 1; }
.cat-svg { width: 100%; height: auto; display: block; }
.cat-label {
  text-align: center;
  font-family: var(--font-display);
  font-size: 0.8rem;
  color: var(--ink-muted);
  letter-spacing: 0.05em;
  min-height: 1em;
  margin-top: -0.1rem;
}

/* Hide all mood part variants by default */
.cat-svg .eyes-normal,
.cat-svg .eyes-closed,
.cat-svg .eyes-star,
.cat-svg .eyes-hearts,
.cat-svg .eyes-shocked,
.cat-svg .mouth-neutral,
.cat-svg .mouth-smile,
.cat-svg .mouth-open,
.cat-svg .acc-zzz,
.cat-svg .acc-sparkles,
.cat-svg .acc-hearts,
.cat-svg .acc-question { display: none; }

/* Per-mood: show the right parts */
.cat-svg.idle     .eyes-normal,
.cat-svg.idle     .mouth-neutral,
.cat-svg.happy    .eyes-closed,
.cat-svg.happy    .mouth-smile,
.cat-svg.excited  .eyes-star,
.cat-svg.excited  .mouth-smile,
.cat-svg.excited  .acc-sparkles,
.cat-svg.dreamy   .eyes-hearts,
.cat-svg.dreamy   .mouth-smile,
.cat-svg.dreamy   .acc-hearts,
.cat-svg.sleepy   .eyes-closed,
.cat-svg.sleepy   .mouth-neutral,
.cat-svg.sleepy   .acc-zzz,
.cat-svg.shocked  .eyes-shocked,
.cat-svg.shocked  .mouth-open,
.cat-svg.thinking .eyes-normal,
.cat-svg.thinking .mouth-neutral,
.cat-svg.thinking .acc-question { display: initial; }

/* Blink on idle / thinking */
@keyframes blink {
  0%, 92%, 100% { transform: scaleY(1); }
  94% { transform: scaleY(0.05); }
  96% { transform: scaleY(1); }
}
.cat-svg.idle .eyes-normal circle,
.cat-svg.thinking .eyes-normal circle {
  transform-origin: 50% 58%;
  animation: blink 5s infinite;
}

/* Sparkles — twinkle */
@keyframes twinkle {
  0%, 100% { opacity: 0.35; transform: scale(0.85); }
  50%      { opacity: 1;    transform: scale(1.15); }
}
.cat-svg.excited .acc-sparkles .spk {
  transform-box: fill-box;
  transform-origin: center;
  animation: twinkle 1.2s ease-in-out infinite;
}
.cat-svg.excited .acc-sparkles .spk2 { animation-delay: 0.3s; }
.cat-svg.excited .acc-sparkles .spk3 { animation-delay: 0.6s; }
.cat-svg.excited .acc-sparkles .spk4 { animation-delay: 0.9s; }

/* Hearts drift up */
@keyframes heartFloat {
  0%   { opacity: 0; transform: translateY(4px); }
  30%  { opacity: 1; transform: translateY(0); }
  70%  { opacity: 1; transform: translateY(-6px); }
  100% { opacity: 0; transform: translateY(-12px); }
}
.cat-svg.dreamy .acc-hearts path {
  transform-box: fill-box;
  transform-origin: center;
  animation: heartFloat 2.4s ease-in-out infinite;
}
.cat-svg.dreamy .acc-hearts .heart2 { animation-delay: 1.2s; }

/* Z's float up */
@keyframes zFloat {
  0%   { opacity: 0; transform: translateY(6px); }
  25%  { opacity: 1; transform: translateY(0); }
  75%  { opacity: 1; transform: translateY(-4px); }
  100% { opacity: 0; transform: translateY(-10px); }
}
.cat-svg.sleepy .acc-zzz text {
  transform-box: fill-box;
  transform-origin: center;
  animation: zFloat 2.4s ease-in-out infinite;
}
.cat-svg.sleepy .acc-zzz .zzz2 { animation-delay: 0.8s; }
.cat-svg.sleepy .acc-zzz .zzz3 { animation-delay: 1.6s; }

/* Thinking — ? tilts */
@keyframes qTilt {
  0%, 100% { transform: rotate(-4deg); }
  50%      { transform: rotate(4deg); }
}
.cat-svg.thinking .acc-question text {
  transform-box: fill-box;
  transform-origin: center;
  animation: qTilt 2s ease-in-out infinite;
}

/* Subtle card-level mood motion */
@keyframes catSway { 0%,100% { transform: rotate(0); } 50% { transform: rotate(1.5deg); } }
@keyframes catBounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
@keyframes catBreathe { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(1.01); } }
@keyframes catWiggle { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }

.cat-card:has(.cat-svg.happy)    .cat-svg { animation: catSway 1.4s ease-in-out infinite; transform-origin: bottom center; }
.cat-card:has(.cat-svg.excited)  .cat-svg { animation: catBounce 0.55s ease-in-out infinite; }
.cat-card:has(.cat-svg.sleepy)   .cat-svg { animation: catBreathe 3s ease-in-out infinite; transform-origin: bottom center; }
.cat-card:has(.cat-svg.shocked)  .cat-svg { animation: catWiggle 0.2s ease 4; }
.cat-card:has(.cat-svg.dreamy)   .cat-svg { animation: catBreathe 4s ease-in-out infinite; transform-origin: bottom center; }

/* ---------- Responsive ---------- */
@media (max-width: 640px) {
  body { font-size: 16px; }
  .postcard { padding: 1.6rem 1.2rem 1.3rem; }
  .proposal-card > h3,
  .proposal-card > .proposal-country,
  .proposal-card > .pitch,
  .proposal-card > .surprise-card,
  .proposal-card > .section-title,
  .proposal-card > .transport,
  .proposal-card > .highlight-list,
  .proposal-card > .info-block,
  .proposal-card > .best-time,
  .proposal-card > .weekend-2026,
  .proposal-card > .coffee-card,
  .proposal-card > .sweet-tour-card,
  .proposal-card > .ruin-card,
  .proposal-card > .subsections,
  .proposal-card > .budget-table,
  .proposal-card > .vibe-tags,
  .proposal-card > .itinerary-section { margin-left: 1.1rem; margin-right: 1.1rem; }
  .budget-table { width: calc(100% - 2.2rem); margin: 0.4rem 1.1rem; }
  .itinerary-section { margin: 1rem 1.1rem 0; }
  .gallery-thumbs { padding: 0.7rem 1.1rem 0.2rem; }
  .cat-card { width: 80px; bottom: 0.6rem; right: 0.6rem; padding: 0.25rem; }
  .passport-stamp { font-size: 2rem; padding: 0.8rem 1.6rem; letter-spacing: 2px; }
  .runner-card { grid-template-columns: 1fr; }

}

/* ---------- Reduced motion ---------- */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }

}
</style>
