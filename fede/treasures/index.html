<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FAF6EE">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Búsqueda de los Tesoros</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hdr">
    <div class="hdr-title">
      <h1>Búsqueda de los Tesoros</h1>
      <p class="subtitle">para Fede</p>
    </div>
    <div class="hdr-progress" id="progressLabel" aria-live="polite"></div>
  </header>
  <div id="debugBanner" class="debug-banner" hidden></div>

  <main>
    <section class="map-wrap" aria-label="Mapa de Boston">
      <div id="map"></div>
      <button id="sonarToggle" class="sonar-btn" type="button" aria-pressed="false" aria-label="Sonar" title="Sonar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="2"/>
          <path d="M12 5.5a6.5 6.5 0 0 1 6.5 6.5"/>
          <path d="M12 8.5a3.5 3.5 0 0 1 3.5 3.5"/>
        </svg>
      </button>
    </section>

    <section id="cluePanel" class="clue-panel" aria-live="polite"></section>
  </main>

  <dialog id="finaleDialog" class="finale" aria-label="Galería final"></dialog>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
