<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FAF6EE">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Búsqueda de los Tesoros · v1.1</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- leaflet is only used by the debug GPS spoofer (loaded lazily by app.js) -->
</head>
<body>
  <header class="hdr">
    <div class="hdr-title">
      <h1>Búsqueda de los Tesoros <span class="hdr-version">v1.1</span></h1>
      <p class="subtitle">para Fede</p>
    </div>
    <div class="hdr-right">
      <div class="hdr-progress" id="progressLabel" aria-live="polite"></div>
      <button type="button" id="restartBtn" class="hdr-restart" title="Empezar de nuevo">↺ reiniciar</button>
    </div>
  </header>
  <div id="debugBanner" class="debug-banner" hidden></div>
  <div id="gpsSpoof" class="gps-spoof" hidden>
    <div class="gps-spoof-head">
      <span>SPOOF GPS</span>
      <button type="button" id="gpsSpoofToggle" class="gps-spoof-btn" aria-pressed="false">activar</button>
      <button type="button" id="gpsSpoofJump" class="gps-spoof-btn" title="ir a la parada activa">↺ parada</button>
      <button type="button" id="gpsSpoofCollapse" class="gps-spoof-btn" title="minimizar">—</button>
    </div>
    <div id="gpsSpoofMap" class="gps-spoof-map"></div>
    <div id="gpsSpoofInfo" class="gps-spoof-info">arrastrá el pin</div>
  </div>

  <main>
    <section class="radar-wrap" aria-label="Radar">
      <div class="radar-stage">
        <svg id="radar" class="radar" viewBox="-110 -110 220 220" aria-hidden="true">
          <defs>
            <radialGradient id="radarBg" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="rgba(40,255,120,0.22)"/>
              <stop offset="55%" stop-color="rgba(10,180,60,0.08)"/>
              <stop offset="100%" stop-color="rgba(0,30,15,0)"/>
            </radialGradient>
            <radialGradient id="blipGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="rgba(200,255,210,1)"/>
              <stop offset="45%" stop-color="rgba(60,235,120,0.55)"/>
              <stop offset="100%" stop-color="rgba(60,235,120,0)"/>
            </radialGradient>
            <radialGradient id="sweepGrad" cx="0" cy="0" r="100" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="rgba(160,255,190,0.85)"/>
              <stop offset="55%" stop-color="rgba(50,230,110,0.22)"/>
              <stop offset="100%" stop-color="rgba(50,230,110,0)"/>
            </radialGradient>
          </defs>

          <circle r="100" fill="url(#radarBg)"/>
          <circle r="100" class="radar-ring outer"/>
          <circle r="75" class="radar-ring"/>
          <circle r="50" class="radar-ring"/>
          <circle r="25" class="radar-ring"/>
          <line x1="-100" y1="0" x2="100" y2="0" class="radar-cross"/>
          <line x1="0" y1="-100" x2="0" y2="100" class="radar-cross"/>
          <g id="radarCards">
            <text x="0" y="-88" class="radar-card is-north" text-anchor="middle">N</text>
            <text x="92" y="3" class="radar-card" text-anchor="middle">E</text>
            <text x="0" y="98" class="radar-card" text-anchor="middle">S</text>
            <text x="-92" y="3" class="radar-card" text-anchor="middle">W</text>
          </g>
          <g id="radarForward" class="radar-forward-wrap" style="display:none">
            <polygon class="radar-forward" points="0,-104 -5,-94 5,-94"/>
          </g>

          <g id="radarSweep" class="radar-sweep">
            <path d="M 0 0 L 0 -100 A 100 100 0 0 1 70.71 -70.71 Z" fill="url(#sweepGrad)"/>
            <line x1="0" y1="0" x2="0" y2="-100" class="radar-sweep-line"/>
            <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="4s" repeatCount="indefinite"/>
          </g>

          <g id="radarBlip" class="radar-blip" style="display:none">
            <circle r="20" class="radar-blip-halo" fill="url(#blipGlow)"/>
            <circle r="5" class="radar-blip-core"/>
          </g>

          <circle r="2.6" class="radar-me"/>
        </svg>
        <div class="radar-status" id="radarStatus">esperando posición…</div>
      </div>

      <button id="sonarToggle" class="sonar-btn" type="button" aria-pressed="false" aria-label="Sonar" title="Sonar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="2"/>
          <path d="M12 5.5a6.5 6.5 0 0 1 6.5 6.5"/>
          <path d="M12 8.5a3.5 3.5 0 0 1 3.5 3.5"/>
        </svg>
      </button>
    </section>

    <section id="cluePanel" class="clue-panel" aria-live="polite"></section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
