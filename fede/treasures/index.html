<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FAF6EE">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Búsqueda de los Tesoros · v1.3</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=IM+Fell+English+SC&family=Inter:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- leaflet is only used by the debug GPS spoofer (loaded lazily by app.js) -->
</head>
<body>
  <header class="hdr">
    <div class="hdr-title">
      <h1>Búsqueda de los Tesoros <span class="hdr-version">v1.3</span></h1>
      <p class="subtitle">para Fede</p>
    </div>
    <div class="hdr-right">
      <div class="hdr-progress" id="progressLabel" aria-live="polite"></div>
      <button type="button" id="restartBtn" class="hdr-restart" title="Empezar de nuevo">↺ reiniciar</button>
    </div>
  </header>
  <div id="debugBanner" class="debug-banner" hidden></div>
  <div id="gpsSpoof" class="gps-spoof" hidden>
    <div class="gps-spoof-head">
      <span>SPOOF GPS</span>
      <button type="button" id="gpsSpoofToggle" class="gps-spoof-btn" aria-pressed="false">activar</button>
      <button type="button" id="gpsSpoofJump" class="gps-spoof-btn" title="ir a la parada activa">↺ parada</button>
      <button type="button" id="gpsSpoofCollapse" class="gps-spoof-btn" title="minimizar">—</button>
    </div>
    <div id="gpsSpoofMap" class="gps-spoof-map"></div>
    <div class="gps-spoof-heading">
      <label for="gpsSpoofHeading">rumbo</label>
      <input id="gpsSpoofHeading" type="range" min="0" max="359" value="0">
      <span id="gpsSpoofHeadingVal">0°</span>
    </div>
    <div id="gpsSpoofInfo" class="gps-spoof-info">arrastrá el pin · ← → cambia objetivo</div>
  </div>

  <main>
    <section class="compass-wrap" aria-label="Brújula">
      <div class="compass-stage">
        <svg id="compass" class="compass-svg" viewBox="-150 -150 300 300" aria-hidden="true">
          <defs>
            <radialGradient id="paperFace" cx="50%" cy="42%" r="65%">
              <stop offset="0%"  stop-color="#f5e9c8"/>
              <stop offset="55%" stop-color="#dac79a"/>
              <stop offset="100%" stop-color="#9a8556"/>
            </radialGradient>
            <radialGradient id="brassBezel" cx="50%" cy="50%" r="50%">
              <stop offset="80%"  stop-color="#7a5a2a"/>
              <stop offset="92%"  stop-color="#d9b06a"/>
              <stop offset="100%" stop-color="#4a2e10"/>
            </radialGradient>
            <radialGradient id="brassOuter" cx="50%" cy="50%" r="50%">
              <stop offset="86%"  stop-color="#2a190c"/>
              <stop offset="94%"  stop-color="#8a6535"/>
              <stop offset="100%" stop-color="#1c0f06"/>
            </radialGradient>
            <radialGradient id="glassShine" cx="35%" cy="28%" r="55%">
              <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.42"/>
              <stop offset="35%"  stop-color="#ffffff" stop-opacity="0.10"/>
              <stop offset="70%"  stop-color="#ffffff" stop-opacity="0"/>
            </radialGradient>
            <radialGradient id="glassShadow" cx="62%" cy="78%" r="55%">
              <stop offset="0%"  stop-color="#000000" stop-opacity="0.22"/>
              <stop offset="60%" stop-color="#000000" stop-opacity="0.04"/>
              <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
            </radialGradient>
            <linearGradient id="needleRed" x1="0" y1="-100" x2="0" y2="0" gradientUnits="userSpaceOnUse">
              <stop offset="0%"  stop-color="#c83a30"/>
              <stop offset="60%" stop-color="#9c2a22"/>
              <stop offset="100%" stop-color="#5a1410"/>
            </linearGradient>
            <linearGradient id="needlePale" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#f8efd5"/>
              <stop offset="55%"  stop-color="#e2d2a8"/>
              <stop offset="100%" stop-color="#8a7748"/>
            </linearGradient>
            <pattern id="specks" width="6" height="6" patternUnits="userSpaceOnUse">
              <rect width="6" height="6" fill="transparent"/>
              <circle cx="1.4" cy="2.1" r="0.35" fill="#7a5a2a" opacity="0.15"/>
              <circle cx="4.6" cy="4.9" r="0.25" fill="#3a2412" opacity="0.10"/>
            </pattern>
          </defs>

          <circle r="146" fill="url(#brassOuter)"/>
          <circle r="138" fill="url(#brassBezel)"/>
          <circle r="125" fill="none" stroke="#3a2412" stroke-width="1.4"/>
          <circle r="123" fill="none" stroke="#d9b06a" stroke-width="0.6" opacity="0.55"/>
          <g id="rivets"></g>
          <circle r="122" fill="url(#paperFace)"/>
          <circle r="122" fill="url(#specks)"/>

          <g id="faceRose">
            <g id="ticks"></g>
            <g id="rose">
              <g><polygon points="0,-95 8,-12 0,0 -8,-12" fill="#efe3c5" stroke="#3a2412" stroke-width="0.6"/><polygon points="0,-95 8,-12 0,0" fill="#c9b58a" opacity="0.85"/></g>
              <g transform="rotate(90)"><polygon points="0,-95 8,-12 0,0 -8,-12" fill="#efe3c5" stroke="#3a2412" stroke-width="0.6"/><polygon points="0,-95 8,-12 0,0" fill="#c9b58a" opacity="0.85"/></g>
              <g transform="rotate(180)"><polygon points="0,-95 8,-12 0,0 -8,-12" fill="#efe3c5" stroke="#3a2412" stroke-width="0.6"/><polygon points="0,-95 8,-12 0,0" fill="#c9b58a" opacity="0.85"/></g>
              <g transform="rotate(270)"><polygon points="0,-95 8,-12 0,0 -8,-12" fill="#efe3c5" stroke="#3a2412" stroke-width="0.6"/><polygon points="0,-95 8,-12 0,0" fill="#c9b58a" opacity="0.85"/></g>
              <g transform="rotate(45)"><polygon points="0,-66 5,-10 0,0 -5,-10" fill="#dac79a" stroke="#3a2412" stroke-width="0.5"/><polygon points="0,-66 5,-10 0,0" fill="#a08c5e" opacity="0.7"/></g>
              <g transform="rotate(135)"><polygon points="0,-66 5,-10 0,0 -5,-10" fill="#dac79a" stroke="#3a2412" stroke-width="0.5"/><polygon points="0,-66 5,-10 0,0" fill="#a08c5e" opacity="0.7"/></g>
              <g transform="rotate(225)"><polygon points="0,-66 5,-10 0,0 -5,-10" fill="#dac79a" stroke="#3a2412" stroke-width="0.5"/><polygon points="0,-66 5,-10 0,0" fill="#a08c5e" opacity="0.7"/></g>
              <g transform="rotate(315)"><polygon points="0,-66 5,-10 0,0 -5,-10" fill="#dac79a" stroke="#3a2412" stroke-width="0.5"/><polygon points="0,-66 5,-10 0,0" fill="#a08c5e" opacity="0.7"/></g>
              <circle r="14" fill="#3a2412" opacity="0.55"/>
              <circle r="14" fill="none" stroke="#d9b06a" stroke-width="0.8" opacity="0.7"/>
            </g>
            <g font-family="'Cinzel', serif" font-weight="600" fill="#3a2412">
              <text x="0" y="-108" font-size="18" text-anchor="middle">N</text>
              <text x="108" y="6" font-size="15" text-anchor="middle">E</text>
              <text x="0" y="118" font-size="15" text-anchor="middle">S</text>
              <text x="-108" y="6" font-size="15" text-anchor="middle">W</text>
            </g>
            <g font-family="'IM Fell English SC', serif" font-style="italic" fill="#7d6a40" font-size="9">
              <text x="78" y="-72" text-anchor="middle">NE</text>
              <text x="80" y="80" text-anchor="middle">SE</text>
              <text x="-78" y="80" text-anchor="middle">SW</text>
              <text x="-80" y="-72" text-anchor="middle">NW</text>
            </g>
          </g>

          <g id="compassForward">
            <polygon points="0,-130 -7,-118 7,-118" fill="#e6b43c" stroke="#5a3a10" stroke-width="0.6"/>
          </g>

          <g id="needleRotor" style="display:none">
            <g id="needle">
              <polygon points="0,-96 -7,-12 0,4 7,-12" fill="url(#needleRed)" stroke="#3a0f0a" stroke-width="0.6"/>
              <polygon points="0,-96 0,4 -1.5,-12" fill="#ffffff" opacity="0.18"/>
              <polygon points="0,96 -7,12 0,-4 7,12" fill="url(#needlePale)" stroke="#5a4427" stroke-width="0.6"/>
              <polygon points="0,96 0,-4 -1.5,12" fill="#ffffff" opacity="0.25"/>
            </g>
            <circle r="7" fill="#1a0f08" stroke="#d9b06a" stroke-width="1.2"/>
            <circle r="3.2" fill="#d9b06a"/>
            <circle r="1.4" fill="#fff4cc"/>
          </g>

          <circle r="122" fill="url(#glassShadow)"/>
          <circle r="122" fill="url(#glassShine)"/>
          <circle r="122" fill="none" stroke="#2a190c" stroke-width="2" opacity="0.32"/>
        </svg>
        <div class="compass-status" id="compassStatus">esperando posición…</div>
      </div>

      <button id="sonarToggle" class="sonar-btn" type="button" aria-pressed="false" aria-label="Sonar" title="Sonar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="2"/>
          <path d="M12 5.5a6.5 6.5 0 0 1 6.5 6.5"/>
          <path d="M12 8.5a3.5 3.5 0 0 1 3.5 3.5"/>
        </svg>
      </button>
    </section>

    <section id="cluePanel" class="clue-panel" aria-live="polite"></section>
  </main>

  <div id="lightbox" class="lightbox" hidden aria-hidden="true">
    <button id="lightboxClose" class="lightbox-close" type="button" aria-label="Cerrar">×</button>
    <img id="lightboxImg" alt="">
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
