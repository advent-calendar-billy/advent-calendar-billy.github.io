<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hints picker · Búsqueda de los Tesoros</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: #FAF6EE;
    color: #2A2520;
    font-family: 'Inter', system-ui, sans-serif;
    line-height: 1.5;
  }
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 28px 20px 120px;
  }
  header h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    font-size: 1.5rem;
    margin: 0 0 6px;
  }
  header p {
    color: #7A6F60;
    margin: 0 0 24px;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 0.96rem;
  }
  .stop {
    margin: 36px 0 0;
    padding-top: 18px;
    border-top: 1px solid rgba(42, 37, 32, 0.10);
  }
  .stop h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 1.15rem;
    margin: 0 0 4px;
  }
  .stop .meta {
    font-size: 0.78rem;
    color: #7A6F60;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 0 0 12px;
  }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    border: 1.5px solid rgba(42, 37, 32, 0.14);
    border-radius: 10px;
    padding: 12px 16px;
    margin: 8px 0;
    background: #fff;
    cursor: pointer;
    font: inherit;
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    line-height: 1.45;
    color: #2A2520;
    transition: border-color 0.15s, background 0.15s, transform 0.05s;
  }
  .opt:hover { border-color: #C58A3A; background: #FFFBF1; }
  .opt:active { transform: scale(0.997); }
  .opt.is-current {
    border-color: rgba(122, 111, 96, 0.40);
    background: rgba(122, 111, 96, 0.06);
  }
  .opt.is-current::before {
    content: 'ACTUAL';
    display: inline-block;
    font-family: 'Inter', sans-serif;
    font-style: normal;
    font-size: 0.66rem;
    letter-spacing: 0.12em;
    color: #7A6F60;
    border: 1px solid rgba(122, 111, 96, 0.45);
    border-radius: 99px;
    padding: 1px 8px;
    margin-right: 10px;
    vertical-align: 2px;
  }
  .opt.is-selected {
    border-color: #5A7A4F;
    background: rgba(90, 122, 79, 0.10);
    box-shadow: 0 0 0 1px #5A7A4F;
  }
  .opt.is-selected::after {
    content: '✓ elegida';
    float: right;
    color: #3a5530;
    font-family: 'Inter', sans-serif;
    font-style: normal;
    font-size: 0.74rem;
    letter-spacing: 0.08em;
    margin-left: 10px;
  }
  .opt.is-rejected {
    border-color: rgba(180, 70, 50, 0.55);
    background: rgba(180, 70, 50, 0.05);
    color: #8E3422;
  }
  .opt.is-rejected::after {
    content: 'NINGUNA';
    float: right;
    color: #8E3422;
    font-family: 'Inter', sans-serif;
    font-style: normal;
    font-size: 0.74rem;
    letter-spacing: 0.08em;
  }
  .none-btn {
    margin-top: 6px;
    background: transparent;
    border: 1.5px dashed rgba(180, 70, 50, 0.45);
    color: #8E3422;
    border-radius: 10px;
    padding: 10px 16px;
    cursor: pointer;
    font: inherit;
    font-size: 0.86rem;
    width: 100%;
    text-align: center;
    font-style: italic;
  }
  .none-btn:hover { background: rgba(180, 70, 50, 0.06); }
  .none-btn.is-active {
    background: rgba(180, 70, 50, 0.10);
    border-style: solid;
    border-color: #B44632;
    color: #6f2110;
    font-weight: 600;
  }

  .footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(250, 246, 238, 0.96);
    backdrop-filter: blur(6px);
    border-top: 1px solid rgba(42, 37, 32, 0.10);
    padding: 14px 18px max(env(safe-area-inset-bottom), 14px);
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: space-between;
  }
  .footer .summary {
    font-size: 0.84rem;
    color: #7A6F60;
    font-variant-numeric: tabular-nums;
  }
  .footer .actions { display: flex; gap: 8px; }
  .btn {
    background: #2A2520;
    color: #FAF6EE;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font: inherit;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .btn.ghost {
    background: transparent;
    color: #2A2520;
    border: 1px solid rgba(42, 37, 32, 0.30);
  }
  .btn:hover { opacity: 0.9; }
</style>
</head>
<body>
<main>

<header>
  <h1>Hints picker · Cape Ann</h1>
  <p>Solo las 4 paradas del día 2 (Gloucester + Rockport). Para cada una, varias alternativas. Click = elegida. "Ninguna" si nada te cierra.<br>Las elecciones se guardan al instante; bajá el JSON cuando termines y mandámelo.</p>
</header>

<div id="stops"></div>

</main>

<div class="footer">
  <div class="summary" id="summary">0 / 4 paradas decididas</div>
  <div class="actions">
    <button class="btn ghost" id="resetBtn">borrar todo</button>
    <button class="btn" id="downloadBtn">↓ bajar hints-choices.json</button>
  </div>
</div>

<script>
const HINTS = [
  {
    id: '06',
    name: '06 · Hammond Castle',
    note: 'Pregunta: año en que empezó la construcción. (Sin decir "castillo".)',
    current: "Sobre el mar, un castillo medieval que no es medieval. Lo levantó un inventor con más de 800 patentes. ¿En qué año empezó?",
    options: [
      "Un inventor con más de 800 patentes se construyó acá su casa. ¿En qué año empezó?",
      "¿En qué año empezó a construir su hogar el segundo inventor más prolífico después de Edison?",
      "Adentro hay un órgano de 8500 tubos. ¿En qué año empezó a construirse el edificio que lo guarda?",
      "Sobre el acantilado, un excéntrico levantó piedra por piedra su residencia con piscina romana. ¿En qué año empezó?",
      "Acá vivió un inventor que coleccionaba arte medieval. ¿En qué año empezó a levantarse esta casa?"
    ]
  },
  {
    id: '07',
    name: "07 · Gloucester Fisherman's Memorial",
    note: 'Pregunta: año de fundación del pueblo (1623). Sin decir "monumento al pescador".',
    current: "Frente al mar, un hombre de bronce sostiene un timón. La placa cuenta cuándo nació este pueblo. Solo el año.",
    options: [
      "Una figura de bronce mira el océano. La placa cuenta cuándo nació este pueblo. Solo el año.",
      "¿En qué año fue fundado este pueblo? Hay un monumento de bronce frente al mar; la placa lo dice.",
      "Una placa al pie de una estatua de bronce dice cuándo arrancó este lugar. ¿Cuándo?",
      "Hay una estatua de bronce con la mirada fija en el Atlántico. Su placa lleva una fecha redonda. ¿Cuál?",
      "Alguien de bronce sostiene una rueda mirando al mar. La placa lleva el año fundacional. ¿Cuál?"
    ]
  },
  {
    id: '08',
    name: '08 · Rocky Neck · (foto-contraseña)',
    note: 'Esta no es puzzle: es la instrucción para comprarme algo + foto mía sonriendo. Sin decir "colonia de artistas".',
    current: "Acá pintaron Hopper, Homer y muchos otros desde hace casi dos siglos. Buscá una pieza chica que creas que a Billy le va a fascinar. La contraseña es una foto de Billy, sonriendo, con el regalo.",
    options: [
      "Comprame una pieza chica que creas que me va a fascinar. Contraseña: foto mía sonriendo con el regalo.",
      "Hay galerías por todos lados. Encontrame algo chico que vaya conmigo. Foto mía sonriendo con eso = contraseña.",
      "Hopper y Homer pintaron acá. Elegime algo chico para llevarte a casa. La contraseña es una foto mía sonriendo con tu elección.",
      "Acá hay arte por donde mires. Comprame una pieza chiquita. Foto mía sonriendo con el regalo desbloquea el siguiente.",
      "Encontrá una pieza chica que pienses que me va a fascinar. Foto mía sonriendo con eso = contraseña."
    ]
  },
  {
    id: '09',
    name: '09 · Halibut Point · Babson Farm Quarry',
    note: 'Pregunta: nombre del lugar (dos palabras inglés, "Babson Farm"). Sin decir "cantera".',
    current: "Al final del camino, un pozo profundo lleno de agua de lluvia te espera en lo alto de un acantilado. ¿Cómo se llamaba? (dos palabras en inglés)",
    options: [
      "Hay un agujero profundo en la roca, lleno de agua de lluvia, sobre el océano. ¿Cómo se llama el lugar? (dos palabras, inglés)",
      "Subí hasta el final del camino: vas a encontrar un pozo con agua estancada al borde del Atlántico. ¿Qué nombre tiene? (dos palabras, inglés)",
      "Un hueco rectangular lleno de lluvia, suspendido sobre el océano. ¿Cómo se llama? (dos palabras, inglés)",
      "En lo alto, los carteles cuentan el nombre de este pozo de roca que mira al mar. ¿Cuál? (dos palabras, inglés)",
      "Algo enorme y profundo, lleno de lluvia, en el borde del Atlántico. ¿Cómo se llama? (dos palabras, inglés)"
    ]
  },
];

const STORAGE_KEY = 'hints-picker:v1';
const state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
// state shape: { '01': { choice: number | 'none' | null, text: string | null } }

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  renderSummary();
}

function renderSummary() {
  const decided = Object.values(state).filter(v => v && (v.choice === 'none' || typeof v.choice === 'number')).length;
  document.getElementById('summary').textContent = `${decided} / ${HINTS.length} paradas decididas`;
}

function render() {
  const root = document.getElementById('stops');
  root.innerHTML = '';
  HINTS.forEach(stop => {
    const section = document.createElement('section');
    section.className = 'stop';
    const cur = state[stop.id] || {};
    section.innerHTML = `
      <h2>${stop.name}</h2>
      <p class="meta">${stop.note ? stop.note : 'Click para elegir.'}</p>
    `;
    stop.options.forEach((opt, i) => {
      const isCurrent = opt === stop.current;
      const isSelected = cur.choice === i;
      const btn = document.createElement('button');
      btn.className = 'opt' + (isCurrent ? ' is-current' : '') + (isSelected ? ' is-selected' : '');
      btn.textContent = opt;
      btn.addEventListener('click', () => {
        if (state[stop.id]?.choice === i) {
          state[stop.id] = null;
        } else {
          state[stop.id] = { choice: i, text: opt };
        }
        save();
        render();
      });
      section.appendChild(btn);
    });
    const none = document.createElement('button');
    none.className = 'none-btn' + (cur.choice === 'none' ? ' is-active' : '');
    none.textContent = 'ninguna me cierra · reescribir';
    none.addEventListener('click', () => {
      if (state[stop.id]?.choice === 'none') {
        state[stop.id] = null;
      } else {
        state[stop.id] = { choice: 'none', text: null };
      }
      save();
      render();
    });
    section.appendChild(none);
    root.appendChild(section);
  });
  renderSummary();
}

document.getElementById('downloadBtn').addEventListener('click', () => {
  // serialize the chosen hint per stop into a clean shape
  const out = {};
  HINTS.forEach(stop => {
    const v = state[stop.id];
    if (!v || v.choice === null) {
      out[stop.id] = { status: 'undecided', text: null };
    } else if (v.choice === 'none') {
      out[stop.id] = { status: 'rejected', text: null };
    } else {
      out[stop.id] = { status: 'chosen', index: v.choice, text: v.text };
    }
  });
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'hints-choices.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm('¿Borrar todas las elecciones?')) return;
  Object.keys(state).forEach(k => delete state[k]);
  save();
  render();
});

render();
</script>
</body>
</html>
