<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FAF6EE">
<title>tickets · 1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.8.6/jsrsasign-all-min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    background: #FAF6EE;
    color: #2A2520;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    min-height: 100dvh;
  }
  main {
    max-width: 480px;
    margin: 0 auto;
    padding: max(env(safe-area-inset-top), 22px) 18px max(env(safe-area-inset-bottom), 40px);
  }
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 6px;
    gap: 12px;
  }
  h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 1.35rem;
    font-weight: 500;
    margin: 0;
    letter-spacing: 0.005em;
  }
  .refresh-btn {
    background: transparent;
    border: 1px solid rgba(42, 37, 32, 0.20);
    color: #2A2520;
    border-radius: 8px;
    width: 36px;
    height: 36px;
    font-size: 1rem;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  .refresh-btn:hover { background: rgba(42, 37, 32, 0.04); }
  .refresh-btn:active { transform: scale(0.95); }
  .refresh-btn.spinning { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #status {
    font-size: 0.78rem;
    color: #7A6F60;
    margin: 0 0 18px;
    font-variant-numeric: tabular-nums;
    min-height: 1.1em;
  }
  #status.err { color: #8E3422; }

  ul.tickets {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .ticket {
    border: 1px solid rgba(42, 37, 32, 0.12);
    border-radius: 12px;
    padding: 14px 16px;
    background: #fff;
    box-shadow: 0 1px 2px rgba(42, 37, 32, 0.03);
    transition: opacity 0.2s, transform 0.2s;
  }
  .ticket-text {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 1.08rem;
    line-height: 1.4;
    color: #2A2520;
  }
  .ticket.used { background: rgba(42, 37, 32, 0.03); }
  .ticket.used .ticket-text {
    text-decoration: line-through;
    color: rgba(42, 37, 32, 0.45);
  }
  .ticket-used {
    font-size: 0.74rem;
    color: rgba(42, 37, 32, 0.55);
    margin-top: 6px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .mark-btn {
    margin-top: 12px;
    background: #2A2520;
    color: #FAF6EE;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font: inherit;
    font-size: 0.84rem;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: opacity 0.15s, background 0.15s, transform 0.1s;
  }
  .mark-btn:hover { background: #3D3631; }
  .mark-btn:active { transform: scale(0.98); }
  .mark-btn:disabled { opacity: 0.4; cursor: wait; }

  .empty {
    text-align: center;
    color: #7A6F60;
    font-family: 'Fraunces', serif;
    font-style: italic;
    padding: 40px 0;
    font-size: 0.95rem;
  }

  /* unmark (admin escape — only shown if URL has ?undo) */
  .unmark-btn {
    display: none;
    background: none;
    border: none;
    color: rgba(180, 70, 50, 0.7);
    font: inherit;
    font-size: 0.72rem;
    text-decoration: underline;
    cursor: pointer;
    padding: 4px 0 0;
    letter-spacing: 0.04em;
  }
  body.with-undo .unmark-btn { display: inline-block; }
</style>
</head>
<body>
<main>
  <header>
    <h1>tickets</h1>
    <button class="refresh-btn" id="refreshBtn" aria-label="recargar" title="recargar">↻</button>
  </header>
  <p id="status"></p>
  <ul class="tickets" id="tickets"></ul>
</main>

<script>
  const SPREADSHEET_ID = '1SXE6BwnRqVR93MFp-zSI83bBgcqZ5y53Hg197VrzjSo';
  const TAB_NAME = 'Prizes';
  const RANGE = `${TAB_NAME}!A:B`;
  const CRED_URL = '/stories/space/dm_credentials.hex';
  const CRED_PASS = 'dm2';

  // ?undo in the URL reveals an "undo" link on used tickets (writes empty to B)
  if (new URLSearchParams(location.search).has('undo')) {
    document.body.classList.add('with-undo');
  }

  let serviceAccountCredentials = null;
  let accessToken = null;
  let tokenExpiryTime = 0;

  function xorDecrypt(hex, key) {
    const bytes = new Uint8Array(hex.match(/.{1,2}/g).map(b => parseInt(b, 16)));
    const keyB = new TextEncoder().encode(key);
    const plain = bytes.map((b, i) => b ^ keyB[i % keyB.length]);
    return new TextDecoder().decode(plain);
  }

  async function loadCreds() {
    if (serviceAccountCredentials) return;
    const r = await fetch(CRED_URL);
    if (!r.ok) throw new Error('No se cargaron las credenciales');
    const hex = (await r.text()).trim();
    const json = xorDecrypt(hex, CRED_PASS);
    serviceAccountCredentials = JSON.parse(json);
  }

  async function getAccessToken() {
    if (accessToken && Date.now() < tokenExpiryTime) return accessToken;
    await loadCreds();
    const header = { alg: 'RS256', typ: 'JWT' };
    const now = Math.floor(Date.now() / 1000);
    const claims = {
      iss: serviceAccountCredentials.client_email,
      scope: 'https://www.googleapis.com/auth/spreadsheets',
      aud: 'https://oauth2.googleapis.com/token',
      exp: now + 3500,
      iat: now,
    };
    const sJWT = KJUR.jws.JWS.sign(
      'RS256',
      JSON.stringify(header),
      JSON.stringify(claims),
      serviceAccountCredentials.private_key
    );
    const res = await fetch('https://oauth2.googleapis.com/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=' + sJWT,
    });
    if (!res.ok) {
      const t = await res.text();
      throw new Error('OAuth fail: ' + t.slice(0, 120));
    }
    const data = await res.json();
    accessToken = data.access_token;
    tokenExpiryTime = Date.now() + data.expires_in * 1000 - 60000;
    return accessToken;
  }

  async function readPrizes() {
    const token = await getAccessToken();
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(RANGE)}`;
    const res = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
    if (!res.ok) {
      const t = await res.text();
      if (t.includes('Unable to parse range')) {
        throw new Error(`Falta una pestaña llamada "${TAB_NAME}" en el spreadsheet.`);
      }
      throw new Error('Sheet read: ' + t.slice(0, 120));
    }
    const data = await res.json();
    return data.values || [];
  }

  async function writeUsedAt(rowIdx, value) {
    const token = await getAccessToken();
    const range = `${TAB_NAME}!B${rowIdx}`;
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`;
    const res = await fetch(url, {
      method: 'PUT',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: [[value]] }),
    });
    if (!res.ok) {
      const t = await res.text();
      throw new Error('Sheet write: ' + t.slice(0, 120));
    }
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function fmtUsed(s) {
    if (!s) return '';
    const d = new Date(s);
    if (isNaN(d)) return s; // not ISO — show raw
    const pad = n => String(n).padStart(2, '0');
    return `usado · ${pad(d.getDate())}/${pad(d.getMonth() + 1)} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function isHeaderRow(text) {
    return /^(ticket|tickets|prize|prizes|texto|premio|premios)$/i.test(text.trim());
  }

  function render(rows) {
    const ul = document.getElementById('tickets');
    ul.innerHTML = '';
    if (!rows.length) {
      ul.innerHTML = '<li class="empty">Todavía no hay tickets. Agregálos en la pestaña Prizes del spreadsheet.</li>';
      return;
    }
    rows.forEach(({ rowIdx, text, usedAt }) => {
      const li = document.createElement('li');
      li.className = 'ticket' + (usedAt ? ' used' : '');
      const usedLine = usedAt
        ? `<div class="ticket-used">${escapeHtml(fmtUsed(usedAt))}<button class="unmark-btn" data-row="${rowIdx}">deshacer</button></div>`
        : `<button class="mark-btn" data-row="${rowIdx}" data-text="${escapeHtml(text)}">marcar usado</button>`;
      li.innerHTML = `<div class="ticket-text">${escapeHtml(text)}</div>${usedLine}`;
      ul.appendChild(li);
    });

    ul.addEventListener('click', onClick, { once: true });
  }

  async function onClick(e) {
    const ul = document.getElementById('tickets');
    const markBtn = e.target.closest('.mark-btn');
    const unmarkBtn = e.target.closest('.unmark-btn');
    if (markBtn) {
      const row = +markBtn.dataset.row;
      const text = markBtn.dataset.text;
      if (!confirm(`¿Marcar como usado?\n\n"${text}"`)) {
        // re-attach listener
        ul.addEventListener('click', onClick, { once: true });
        return;
      }
      markBtn.disabled = true;
      markBtn.textContent = 'guardando…';
      try {
        await writeUsedAt(row, new Date().toISOString());
        await refresh();
      } catch (err) {
        alert('Error: ' + err.message);
        markBtn.disabled = false;
        markBtn.textContent = 'marcar usado';
        ul.addEventListener('click', onClick, { once: true });
      }
      return;
    }
    if (unmarkBtn) {
      const row = +unmarkBtn.dataset.row;
      if (!confirm('¿Volver a marcar como disponible?')) {
        ul.addEventListener('click', onClick, { once: true });
        return;
      }
      unmarkBtn.disabled = true;
      try {
        await writeUsedAt(row, '');
        await refresh();
      } catch (err) {
        alert('Error: ' + err.message);
        ul.addEventListener('click', onClick, { once: true });
      }
      return;
    }
    ul.addEventListener('click', onClick, { once: true });
  }

  function setStatus(msg, isErr = false) {
    const s = document.getElementById('status');
    s.textContent = msg;
    s.classList.toggle('err', isErr);
  }

  async function refresh() {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    setStatus('cargando…');
    try {
      const values = await readPrizes();
      const rows = [];
      let available = 0, used = 0;
      values.forEach((row, i) => {
        const sheetRow = i + 1;
        const text = (row[0] || '').trim();
        const usedAt = (row[1] || '').trim();
        if (!text) return;
        if (sheetRow === 1 && isHeaderRow(text)) return;
        rows.push({ rowIdx: sheetRow, text, usedAt });
        if (usedAt) used++; else available++;
      });
      render(rows);
      setStatus(`${available} disponible${available === 1 ? '' : 's'} · ${used} usado${used === 1 ? '' : 's'}`);
    } catch (e) {
      setStatus(e.message, true);
      render([]);
    } finally {
      btn.classList.remove('spinning');
    }
  }

  document.getElementById('refreshBtn').addEventListener('click', refresh);
  refresh();
</script>
</body>
</html>
