<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Askhole — Preguntas sin filtro</title>
  <style>
    :root {
      --bg: #0f0f13;
      --card-bg: #1e1e2a;
      --card-border: #35354a;
      --accent: #e8c547;
      --accent-dim: #b09530;
      --text: #ffffff;
      --text-muted: #aaa;
      --num-color: #555;
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--bg);
      color: var(--text);
      touch-action: none;
      user-select: none;
    }

    .scene {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      position: relative;
    }

    /* Header */
    .header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
    }

    .logo {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .card-counter {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    /* Card stack */
    .card-stack {
      position: relative;
      width: 100%;
      max-width: 520px;
      perspective: 1200px;
    }

    /* Ghost cards behind */
    .card-ghost {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      border-radius: var(--radius);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
    }

    .card-ghost-2 {
      top: 12px;
      height: 80px;
      opacity: 0.25;
    }

    .card-ghost-1 {
      top: 6px;
      height: 80px;
      opacity: 0.45;
    }

    /* Main card */
    .card {
      position: relative;
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 40px 36px 44px;
      min-height: 240px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.12s ease, opacity 0.12s ease;
      cursor: pointer;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-dim), var(--accent), var(--accent-dim));
      border-radius: var(--radius) var(--radius) 0 0;
      opacity: 0.6;
    }

    .card.slide-out-left {
      animation: slideOutLeft 0.22s ease forwards;
    }

    .card.slide-out-right {
      animation: slideOutRight 0.22s ease forwards;
    }

    .card.slide-in-right {
      animation: slideInRight 0.22s ease forwards;
    }

    .card.slide-in-left {
      animation: slideInLeft 0.22s ease forwards;
    }

    @keyframes slideOutLeft {
      to { transform: translateX(-110%) rotate(-4deg); opacity: 0; }
    }

    @keyframes slideOutRight {
      to { transform: translateX(110%) rotate(4deg); opacity: 0; }
    }

    @keyframes slideInRight {
      from { transform: translateX(110%) rotate(4deg); opacity: 0; }
      to { transform: translateX(0) rotate(0deg); opacity: 1; }
    }

    @keyframes slideInLeft {
      from { transform: translateX(-110%) rotate(-4deg); opacity: 0; }
      to { transform: translateX(0) rotate(0deg); opacity: 1; }
    }

    .card-number {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.2em;
      color: var(--accent);
      opacity: 0.5;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .card-text {
      font-size: clamp(18px, 4.5vw, 24px);
      line-height: 1.55;
      color: var(--text);
      flex: 1;
      display: flex;
      align-items: center;
    }

    .card-footer {
      margin-top: 24px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--num-color);
      text-align: right;
    }

    /* Navigation */
    .nav {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 32px;
    }

    .nav-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      font-size: 20px;
    }

    .nav-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(232, 197, 71, 0.05);
    }

    .nav-btn:active {
      transform: scale(0.92);
    }

    .nav-btn:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }

    .progress-bar {
      width: 100%;
      max-width: 520px;
      margin-top: 20px;
      height: 2px;
      background: rgba(255,255,255,0.05);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.25s ease;
      opacity: 0.5;
    }

    /* Hint text */
    .hint {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      white-space: nowrap;
      opacity: 0.4;
    }

    /* Shuffle button */
    .shuffle-btn {
      background: none;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      color: var(--text-muted);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .shuffle-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Swipe hint overlay on first visit */
    .swipe-hint {
      display: none;
    }

    @media (max-width: 480px) {
      .card {

        min-height: 200px;
      }

        width: 46px;
        height: 46px;
        font-size: 18px;
      }

      .header {

      }
    }
  </style>
</head>

let currentIndex = 0;
let isAnimating = false;

function buildShuffled() {
  const arr = CARDS.map((_, i) => i);
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

let shuffledOrder = buildShuffled();

function getCurrentCard() {
  return CARDS[shuffledOrder[currentIndex]];
}

function renderCard() {
  const card = getCurrentCard();
  const total = CARDS.length;

  document.getElementById('card-number').textContent = `PREGUNTA #${String(card.id).padStart(3, '0')}`;
  document.getElementById('card-text').textContent = card.text;
  document.getElementById('counter').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('progress').style.width = `${((currentIndex + 1) / total) * 100}%`;

  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = currentIndex === total - 1;
}

function animateTransition(direction, callback) {
  if (isAnimating) return;
  isAnimating = true;

  const card = document.getElementById('card');
  const outClass = direction === 'next' ? 'slide-out-left' : 'slide-out-right';
  const inClass = direction === 'next' ? 'slide-in-right' : 'slide-in-left';

  card.classList.add(outClass);

  setTimeout(() => {
    card.classList.remove(outClass);
    callback();
    renderCard();
    card.classList.add(inClass);
    setTimeout(() => {
      card.classList.remove(inClass);
      isAnimating = false;
    }, 230);
  }, 200);
}

function nextCard() {
  if (currentIndex < CARDS.length - 1) {
    animateTransition('next', () => { currentIndex++; });
  }
}

function prevCard() {
  if (currentIndex > 0) {
    animateTransition('prev', () => { currentIndex--; });
  }
}

function shuffleCards() {
  shuffledOrder = buildShuffled();
  currentIndex = 0;
  renderCard();
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextCard(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevCard(); }
});

// Touch/swipe navigation
let touchStartX = 0;
let touchStartY = 0;

document.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (dx < 0) nextCard();
    else prevCard();
  }
}, { passive: true });

// Hide hint after first interaction
document.addEventListener('keydown', () => {
  document.getElementById('hint').style.opacity = '0';
}, { once: true });
document.addEventListener('touchend', () => {
  document.getElementById('hint').style.opacity = '0';
}, { once: true });

// Init
renderCard();
</script>
